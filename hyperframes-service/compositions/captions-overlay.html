<!doctype html>
<html
  lang="vi"
  data-composition-variables='[
    {"id":"duration","type":"number","label":"Tổng thời lượng (giây) — khớp C1","default":18},
    {"id":"caption_groups","type":"string","label":"Caption karaoke (JSON [{start,end,words:[{text,start,end}]}])","default":"[]"},
    {"id":"accent_color","type":"color","label":"Màu nhấn karaoke (vàng ấm)","default":"#FFD400"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../assets/fonts/be-vietnam-pro.css" />
    <script src="../vendor/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* NỀN TRONG SUỐT (bắt buộc cho alpha render — render-engine screenshot omitBackground). */
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent;
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
      }
      :root { --accent: #ffd400; } /* vàng ấm mặc định (bám mẫu) */
      #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; }

      /* (BỎ keyword IN HOA — Tommy chốt: chỉ giữ caption karaoke cho gọn, giống editor TikTok pro.) */

      /* ── CAPTION KARAOKE (đáy) — trắng + viền, từ đang đọc vàng (mẫu TikTok) ── */
      /* bottom 360→140: khuôn SPLIT-SCREEN có MẶT C1 ở nửa DƯỚI; caption phải nằm GẦN ĐÁY (dưới cằm),
         KHÔNG đè trán/sát ranh split giữa. 140px vẫn an toàn cho video full (không-split). */
      #captions { position: absolute; left: 70px; right: 70px; bottom: 140px; z-index: 10; pointer-events: none; }
      .caption {
        position: absolute; left: 0; right: 0; bottom: 0;
        margin-left: auto; margin-right: auto;
        width: max-content; max-width: 100%; text-align: center;
        color: #fff; font-weight: 800; font-size: 60px; line-height: 1.18; letter-spacing: -0.3px;
        background: rgba(0, 0, 0, 0.42);
        padding: 18px 36px; border-radius: 26px;
        box-shadow: 0 8px 36px rgba(0, 0, 0, 0.4);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.85);
        will-change: transform, opacity;
      }
      .caption .w {
        display: inline-block; color: #fff; margin: 0 0.1em;
        transform-origin: center bottom; will-change: transform, color;
      }
      .caption .w.on {
        color: var(--accent); transform: scale(1.07);
        text-shadow: 0 0 26px rgba(255, 200, 40, 0.6), 0 2px 12px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="captions"></div>
    </div>
    <script>
      const v = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables()
        : {};
      const parseJSON = (s, fb) => { try { return JSON.parse(s); } catch (e) { return fb; } };
      const total = Math.max(1, Number(v.duration) || 18);
      if (v.accent_color && /^#[0-9a-f]{6}$/i.test(String(v.accent_color)))
        document.documentElement.style.setProperty("--accent", v.accent_color);

      // ── Captions karaoke (caption_groups Whisper) — như broll.html ──
      const capHost = document.getElementById("captions");
      const capInfo = []; // {sel,start,end}
      const wordTweens = []; // {sel,on,off}
      let groups = parseJSON(v.caption_groups, []);
      if (!Array.isArray(groups)) groups = [];
      groups = groups.filter((g) => g && Array.isArray(g.words) && g.words.length);
      groups.forEach((g, gi) => {
        const start = Number(g.start) || 0;
        const end = Math.max(start + 0.4, Number(g.end) || start + 1.5);
        const el = document.createElement("div");
        el.className = "caption"; el.id = "cap" + gi;
        g.words.forEach((w, wi) => {
          const span = document.createElement("span");
          span.className = "w"; span.id = "cap" + gi + "w" + wi;
          span.textContent = String(w.text || "");
          el.appendChild(span);
          const ws = Number(w.start) || start;
          const we = Number(w.end) || ws + 0.2;
          wordTweens.push({ sel: "#cap" + gi + "w" + wi, on: ws, off: we });
        });
        capHost.appendChild(el);
        capInfo.push({ sel: "#cap" + gi, start, end });
      });

      // ── GSAP timeline (paused, seekable). immediateRender của fromTo → mọi phần tử ẨN ban đầu. ──
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      gsap.defaults({ ease: "power3.out" });

      capInfo.forEach((c, i) => {
        // CHỈ 1 cụm/thời điểm: hard-kill cụm i TRƯỚC khi cụm i+1 vào → hết 2 dòng đè cùng vị trí.
        const nextStart = i + 1 < capInfo.length ? capInfo[i + 1].start : Infinity;
        const killAt = Math.max(c.start + 0.12, Math.min(c.end, nextStart - 0.06));
        tl.fromTo(c.sel, { y: 40, opacity: 0, scale: 0.92 }, { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.6)" }, c.start);
        tl.set(c.sel, { opacity: 0, visibility: "hidden" }, killAt); // hard-kill (không kẹt .on, không chồng)
      });
      // Karaoke: bật .on từ đang đọc, tắt khi hết (tl.set deterministic, seekable — không callback).
      wordTweens.forEach((w) => {
        tl.set(w.sel, { className: "w on" }, w.on);
        tl.set(w.sel, { className: "w" }, w.off);
      });
      tl.to({}, { duration: 0.001 }, Math.max(0, total - 0.001)); // pad tới hết duration
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
