<!doctype html>
<html
  lang="vi"
  data-composition-variables='[
    {"id":"hook_line1","type":"string","label":"Hook dòng 1","default":"Hầu hết người"},
    {"id":"hook_line2","type":"string","label":"Hook dòng 2","default":"làm content"},
    {"id":"hook_keyword","type":"string","label":"Hook từ khoá (accent)","default":"Đang vô hình"},
    {"id":"hook_sub","type":"string","label":"Hook phụ đề","default":""},
    {"id":"hook_stat","type":"string","label":"Hook stat chip value|unit (rỗng=ẩn)","default":""},
    {"id":"bignum_value","type":"string","label":"S2 số khổng lồ (rỗng=ẩn)","default":""},
    {"id":"bignum_unit","type":"string","label":"S2 đơn vị số lớn","default":""},
    {"id":"bignum_label","type":"string","label":"S2 eyebrow (IN HOA)","default":""},
    {"id":"donut_segments","type":"string","label":"S3 donut JSON [{label,pct,color}]","default":"[]"},
    {"id":"donut_title","type":"string","label":"S3 eyebrow","default":""},
    {"id":"data_bars","type":"string","label":"S4 bar JSON [{label,value,unit}]","default":"[]"},
    {"id":"bars_title","type":"string","label":"S4 eyebrow","default":""},
    {"id":"pictogram","type":"string","label":"S5 pictogram JSON {icons,active,label}","default":""},
    {"id":"flow_nodes","type":"string","label":"S5 flow JSON [\"a\",\"b\",..]","default":"[]"},
    {"id":"news_cards","type":"string","label":"S5 news JSON [{title,body}]","default":"[]"},
    {"id":"levels_title","type":"string","label":"S6 tiêu đề point cards","default":""},
    {"id":"levels","type":"string","label":"S6 point cards JSON [{n,label,desc,active}]","default":"[]"},
    {"id":"cta_top","type":"string","label":"CTA dòng trên","default":"Bạn đang ở"},
    {"id":"cta_keyword","type":"string","label":"CTA từ khoá (accent)","default":"Level mấy?"},
    {"id":"cta_sub","type":"string","label":"CTA phụ đề","default":""},
    {"id":"cta_hl","type":"string","label":"CTA từ khoá nhấn (trắng)","default":""},
    {"id":"img_hero","type":"string","label":"Ảnh cutout hero PNG URL (2B — rỗng ở 2A)","default":""},
    {"id":"accent_color","type":"color","label":"Màu nhấn","default":"#e11d2a"},
    {"id":"voice_url","type":"string","label":"Voice-over URL (mp3/wav, public)","default":""},
    {"id":"duration","type":"string","label":"Tổng thời lượng (giây) — khớp voice-over","default":"18.5"},
    {"id":"theme","type":"string","label":"Theme index (0-4) — đổi màu/nền theo content","default":"0"},
    {"id":"compact","type":"string","label":"QC: compact=1 → co chữ mạnh hơn (chống tràn)","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../assets/fonts/be-vietnam-pro.css" />
    <script src="../vendor/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: #070708;
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
      }
      :root { --red: #e11d2a; --red-soft: #ff3b46; --teal: #1f9e9e; --amber: #f59e0b; }
      #root { position: relative; width: 1080px; height: 1920px; }

      /* ---- Scene base ---- */
      .scene {
        position: absolute; inset: 0; width: 1080px; height: 1920px; overflow: hidden;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
      }
      /* Near-black cinematic gradient (art-direction tokens) — màu accent từ THEME. */
      .bg-dark {
        background:
          radial-gradient(120% 90% at 80% 110%, var(--corner-glow, rgba(160,20,35,0.42)) 0%, rgba(120,15,30,0) 45%),
          radial-gradient(120% 80% at 12% -10%, rgba(70,70,80,0.18) 0%, rgba(0,0,0,0) 50%),
          linear-gradient(160deg, var(--bg1, #111114) 0%, var(--bg2, #0b0b0e) 55%, #070708 100%);
      }
      .dotgrid {
        position: absolute; inset: 0; pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.05) 1.4px, transparent 1.4px);
        background-size: 46px 46px;
        -webkit-mask-image: radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 80%);
        mask-image: radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 80%);
      }
      .vignette { position: absolute; inset: 0; pointer-events: none; box-shadow: inset 0 0 320px 90px rgba(0,0,0,0.86); }
      .grain {
        position: absolute; inset: 0; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay;
        background-image: radial-gradient(rgba(255,255,255,0.9) 0.5px, transparent 0.6px);
        background-size: 3px 3px;
      }
      .eyebrow-top {
        color: rgba(255,255,255,0.5); font-weight: 700; font-size: 34px; letter-spacing: 4px;
        text-transform: uppercase; text-align: center; margin-bottom: 34px; padding: 0 80px;
      }
      .clip.img-cutout {
        position: absolute; pointer-events: none; object-fit: contain;
        filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6)) drop-shadow(0 0 1px rgba(255,255,255,0.25));
        will-change: transform, opacity;
      }

      /* ===================== S1 — hook kinetic ===================== */
      #s1 { padding: 0 90px; }
      #s1 .cap { text-align: center; line-height: 1.02; position: relative; z-index: 2; }
      #s1 .l { display: block; color: #f5f5f7; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; }
      #s1 .l1, #s1 .l2 { font-size: 96px; }
      #s1 .key {
        display: block; color: var(--red); font-weight: 900; font-size: 150px; text-transform: uppercase;
        letter-spacing: -1px; margin: 18px 0 26px; text-shadow: 0 0 60px var(--red-glow, rgba(225,29,42,0.55));
      }
      #s1 .sub { display: block; color: rgba(255,255,255,0.78); font-weight: 600; font-size: 46px; }
      .word { display: inline-block; will-change: transform, opacity; }
      #s1 .motif { position: absolute; inset: 0; margin: auto; width: 820px; height: 820px; border-radius: 50%;
        pointer-events: none; opacity: 0.18; filter: blur(6px); background: radial-gradient(circle, var(--red) 0%, rgba(0,0,0,0) 60%); }
      #s1 .ring { position: absolute; inset: 0; margin: auto; width: 680px; height: 680px; border-radius: 50%;
        border: 3px dashed rgba(255,255,255,0.12); pointer-events: none; will-change: transform; }
      #s1 .chip { position: absolute; left: 0; right: 0; margin: 0 auto; width: max-content; top: 250px;
        display: flex; align-items: center; gap: 14px; padding: 16px 34px; border-radius: 999px;
        background: rgba(255,255,255,0.06); border: 1.6px solid var(--red);
        box-shadow: 0 0 56px var(--red-glow, rgba(225,29,42,0.4)); will-change: transform, opacity; }
      #s1 .chip .cv { color: var(--red); font-weight: 900; font-size: 66px; line-height: 1; }
      #s1 .chip .ct { color: rgba(255,255,255,0.92); font-weight: 600; font-size: 34px; }

      /* ===================== S2 — big number ===================== */
      #s2 .big { text-align: center; position: relative; z-index: 2; padding: 0 60px; }
      /* value + unit CÙNG HÀNG (nowrap) — fitText co cả cụm như 1 khối. */
      #s2 .bnum { color: #f5f5f7; font-weight: 900; font-size: 300px; line-height: 0.96; letter-spacing: -4px;
        text-shadow: 0 0 80px var(--red-glow, rgba(225,29,42,0.4)); white-space: nowrap;
        display: flex; align-items: flex-start; justify-content: center; flex-wrap: nowrap; gap: 0.04em; }
      /* unit nhỏ hơn (superscript), trắng, dính sát số, KHÔNG xuống dòng. em → scale theo fitText. */
      #s2 .bunit { font-size: 0.45em; font-weight: 800; color: #f5f5f7; letter-spacing: 0;
        align-self: flex-start; margin-top: 0.1em; line-height: 1; }
      #s2 .blabel { color: rgba(255,255,255,0.62); font-weight: 600; font-size: 44px; margin-top: 24px; }

      /* ===================== S3 — donut ===================== */
      #s3d .wrap { position: relative; width: 760px; height: 760px; }
      #s3d svg { width: 760px; height: 760px; transform: rotate(-90deg); }
      #s3d .center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      #s3d .cpct { color: #f5f5f7; font-weight: 900; font-size: 150px; line-height: 1; }
      #s3d .clab { color: rgba(255,255,255,0.7); font-weight: 600; font-size: 40px; margin-top: 8px; }
      #s3d .legend { display: flex; gap: 40px; margin-top: 50px; flex-wrap: wrap; justify-content: center; }
      #s3d .lg { display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.85); font-weight: 600; font-size: 38px; }
      #s3d .lg .sw { width: 28px; height: 28px; border-radius: 8px; }

      /* ===================== S4 — bars ===================== */
      #s4b { padding: 0 80px; }
      #s4b .bars { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 44px; }
      #s4b .brow { display: flex; flex-direction: column; gap: 12px; will-change: transform, opacity; }
      #s4b .bname { color: #f5f5f7; font-weight: 700; font-size: 38px; line-height: 1.2; letter-spacing: -0.3px; }
      #s4b .bbar { display: flex; align-items: center; gap: 22px; }
      #s4b .btrack { flex: 1; min-width: 0; height: 44px; border-radius: 22px; background: rgba(255,255,255,0.08);
        overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05); }
      #s4b .bfill { height: 100%; border-radius: 22px; background: linear-gradient(90deg, var(--red-soft), var(--red));
        transform-origin: left center; transform: scaleX(0); will-change: transform;
        box-shadow: 0 0 40px var(--red-glow, rgba(225,29,42,0.4)); }
      #s4b .bval { color: var(--red); font-weight: 900; font-size: 52px; line-height: 1; white-space: nowrap; flex: 0 0 auto; }

      /* ===================== S5 — pictogram / flow / news ===================== */
      #s5 { padding: 0 80px; }
      #s5 .pic { display: grid; grid-template-columns: repeat(5, 1fr); gap: 30px 36px; max-width: 760px; }
      #s5 .pic .pi { width: 96px; height: 96px; opacity: 0.25; will-change: opacity, transform; }
      #s5 .pic .pi.on { opacity: 1; }
      #s5 .pic .pi svg { width: 100%; height: 100%; }
      #s5 .piclabel { color: rgba(255,255,255,0.8); font-weight: 700; font-size: 48px; margin-top: 56px; text-align: center; }
      #s5 .flow { display: flex; flex-direction: column; gap: 22px; width: 100%; max-width: 760px; }
      #s5 .fnode { display: flex; align-items: center; gap: 22px; padding: 30px 38px; border-radius: 22px;
        background: linear-gradient(180deg, rgba(40,40,46,0.9), rgba(20,20,24,0.9)); border: 1.4px solid var(--red);
        color: #f5f5f7; font-weight: 700; font-size: 42px; will-change: transform, opacity; }
      #s5 .fnode .fn { flex: 0 0 60px; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center;
        justify-content: center; font-size: 34px; background: rgba(255,255,255,0.08); color: var(--red); }
      #s5 .news { position: relative; width: 100%; height: 1100px; }
      #s5 .ncard { position: absolute; width: 560px; background: #efe9dc; border-radius: 14px; padding: 34px 36px;
        box-shadow: 0 26px 60px rgba(0,0,0,0.55); will-change: transform, opacity; }
      #s5 .ncard .nt { color: #b3261e; font-weight: 900; font-size: 50px; line-height: 1.1; }
      #s5 .ncard .nb { color: rgba(20,17,15,0.7); font-weight: 500; font-size: 34px; line-height: 1.3; margin-top: 16px; }

      /* ===================== S6 — point cards ===================== */
      #s6 { padding: 0 80px; justify-content: flex-start; }
      #s6 .title { color: #f5f5f7; font-weight: 900; font-size: 64px; text-transform: uppercase; text-align: center;
        letter-spacing: -0.5px; margin-top: 230px; margin-bottom: 70px; line-height: 1.05; }
      #s6 .cards { width: 100%; display: flex; flex-direction: column; gap: 30px; }
      .card { display: flex; align-items: center; gap: 34px; border-radius: 30px; padding: 34px 40px; will-change: transform, opacity;
        background: linear-gradient(180deg, rgba(40,40,46,0.92), rgba(22,22,26,0.92)); border: 1px solid rgba(255,255,255,0.08); }
      .card .badge { flex: 0 0 96px; width: 96px; height: 96px; border-radius: 50%; display: flex; align-items: center;
        justify-content: center; font-weight: 900; font-size: 52px; color: #fff;
        background: radial-gradient(circle at 35% 30%, #3a3a42, #1b1b20); border: 1px solid rgba(255,255,255,0.12); }
      .card .meta { text-align: left; }
      .card .lv { color: rgba(255,255,255,0.55); font-weight: 800; font-size: 30px; letter-spacing: 4px; text-transform: uppercase; }
      .card .name { color: #fff; font-weight: 800; font-size: 40px; line-height: 1.18; margin-top: 2px; }
      .card .desc { color: rgba(255,255,255,0.62); font-weight: 500; font-size: 34px; margin-top: 8px; }
      .card.active { background: linear-gradient(180deg, rgba(60,22,26,0.96), rgba(34,14,16,0.96)); border: 1.5px solid var(--red);
        box-shadow: 0 0 70px rgba(225,29,42,0.35); }
      .card.active .badge { background: radial-gradient(circle at 35% 30%, var(--red-soft), var(--red)); border-color: rgba(255,255,255,0.3); }
      .card.active .lv { color: var(--red-soft); }

      /* ===================== S7 — CTA ===================== */
      #s7 .end { text-align: center; max-width: 900px; }
      #s7 .e1 { color: #f5f5f7; font-weight: 800; font-size: 84px; line-height: 1.14; text-transform: uppercase; letter-spacing: -0.5px; }
      #s7 .e2 { color: var(--red); font-weight: 900; font-size: 150px; line-height: 1.12; text-transform: uppercase; letter-spacing: -1px;
        margin-top: 20px; text-shadow: 0 0 70px var(--red-glow, rgba(225,29,42,0.55)); will-change: transform; }
      #s7 .e2 .e2hl { color: #fff; text-shadow: 0 0 46px var(--red-glow, rgba(225,29,42,0.75)); }
      #s7 .e3 { color: rgba(255,255,255,0.78); font-weight: 600; font-size: 44px; line-height: 1.2; margin-top: 46px;
        display: flex; align-items: center; justify-content: center; gap: 14px; }
      #s7 .e3 .emo { font-size: 56px; line-height: 1; }
    </style>
  </head>

  <body>
    <div id="root" class="composition" data-composition-id="main" data-start="0" data-duration="18.5" data-width="1080" data-height="1920">
      <!-- Voice-over: STATIC src (server bakes voice_url + data-duration at compile time). track 9 = off-screen. -->
      <audio id="vo" class="clip" data-start="0" data-duration="18.5" data-track-index="9" data-volume="1" src=""></audio>

      <!-- Persistent dark backdrop (track 0) covering any hidden-scene gap. -->
      <div id="bgbase" class="scene bg-dark clip" data-start="0" data-duration="18.5" data-track-index="0">
        <div class="dotgrid"></div><div class="vignette"></div><div class="grain"></div>
      </div>

      <!-- S1 hook -->
      <div id="s1" class="scene bg-dark clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="dotgrid"></div><div class="vignette"></div>
        <div class="motif"></div><div class="ring" id="s1ring"></div>
        <div class="chip" id="s1chip"><span class="cv" id="s1chipv"></span><span class="ct" id="s1chipt"></span></div>
        <img id="imgHero" class="img-cutout" style="width:420px; right:70px; bottom:120px;" src="" alt="" />
        <div class="cap">
          <span class="l l1" id="s1l1"></span>
          <span class="l l2" id="s1l2"></span>
          <span class="key" id="s1key"></span>
          <span class="sub" id="s1sub"></span>
        </div>
      </div>

      <!-- S2 big number -->
      <div id="s2" class="scene bg-dark clip" data-start="3" data-duration="3" data-track-index="1">
        <div class="dotgrid"></div><div class="vignette"></div><div class="grain"></div>
        <div class="big">
          <div class="eyebrow-top" id="s2label"></div>
          <div class="bnum" id="s2bnum"><span id="s2num">0</span><span class="bunit" id="s2unit"></span></div>
        </div>
      </div>

      <!-- S3 donut -->
      <div id="s3d" class="scene bg-dark clip" data-start="6" data-duration="3.2" data-track-index="1">
        <div class="dotgrid"></div><div class="vignette"></div>
        <div class="eyebrow-top" id="s3title"></div>
        <div class="wrap">
          <svg id="s3svg" viewBox="0 0 320 320"></svg>
          <div class="center"><div class="cpct"><span id="s3pct">0</span>%</div><div class="clab" id="s3clab"></div></div>
        </div>
        <div class="legend" id="s3legend"></div>
      </div>

      <!-- S4 bars -->
      <div id="s4b" class="scene bg-dark clip" data-start="9.2" data-duration="3" data-track-index="1">
        <div class="dotgrid"></div><div class="vignette"></div>
        <div class="eyebrow-top" id="s4title"></div>
        <div class="bars" id="s4bars"></div>
      </div>

      <!-- S5 pictogram / flow / news (multiplexed) -->
      <div id="s5" class="scene bg-dark clip" data-start="12.2" data-duration="2.8" data-track-index="1">
        <div class="dotgrid"></div><div class="vignette"></div>
        <div class="eyebrow-top" id="s5title"></div>
        <div class="pic" id="s5pic"></div>
        <div class="piclabel" id="s5piclabel"></div>
        <div class="flow" id="s5flow"></div>
        <div class="news" id="s5news"></div>
      </div>

      <!-- S6 point cards -->
      <div id="s6" class="scene bg-dark clip" data-start="15" data-duration="2.8" data-track-index="1">
        <div class="dotgrid"></div><div class="vignette"></div>
        <div class="title" id="s6title"></div>
        <div class="cards" id="s6cards"></div>
      </div>

      <!-- S7 CTA -->
      <div id="s7" class="scene bg-dark clip" data-start="17.8" data-duration="2.7" data-track-index="1">
        <div class="dotgrid"></div><div class="vignette"></div>
        <div class="end">
          <div class="e1" id="s7e1"></div>
          <div class="e2" id="s7e2"></div>
          <div class="e3" id="s7e3"><span id="s7e3text"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--red)"><path d="M12 5v14"/><path d="m6 13 6 6 6-6"/></svg></div>
        </div>
      </div>
    </div>

    <script>
      // ── Variables (sync) ──
      const v = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val == null ? "" : String(val); };
      const fillWords = (id, phrase) => {
        const el = document.getElementById(id); if (!el) return;
        el.textContent = "";
        String(phrase || "").trim().split(/\s+/).filter(Boolean).forEach((w, i) => {
          if (i > 0) el.appendChild(document.createTextNode(" "));
          const sp = document.createElement("span"); sp.className = "word"; sp.textContent = w; el.appendChild(sp);
        });
      };
      const parseJSON = (s, fb) => { try { const p = JSON.parse(s); return p == null ? fb : p; } catch (e) { return fb; } };
      const remove = (id) => { const el = document.getElementById(id); if (el) el.remove(); };

      // ── THEME ──
      const THEMES = [
        { red: "#e11d2a", soft: "#ff3b46", glow: "rgba(225,29,42,0.5)",  bg1: "#16161a", bg2: "#0c0c0f", corner: "rgba(160,20,35,0.42)" },
        { red: "#3b82f6", soft: "#60a5fa", glow: "rgba(59,130,246,0.5)", bg1: "#0e1626", bg2: "#070d18", corner: "rgba(40,90,200,0.40)" },
        { red: "#10b981", soft: "#34d399", glow: "rgba(16,185,129,0.48)",bg1: "#0c1a16", bg2: "#06100d", corner: "rgba(16,150,110,0.38)" },
        { red: "#f59e0b", soft: "#fbbf24", glow: "rgba(245,158,11,0.5)", bg1: "#1c1608", bg2: "#0f0b04", corner: "rgba(200,140,20,0.42)" },
        { red: "#a855f7", soft: "#c084fc", glow: "rgba(168,85,247,0.5)", bg1: "#160e22", bg2: "#0c0715", corner: "rgba(130,60,200,0.40)" },
      ];
      const ti = Math.max(0, Math.min(THEMES.length - 1, parseInt(v.theme, 10) || 0));
      const TH = THEMES[ti];
      const rs = document.documentElement.style;
      rs.setProperty("--red", (v.accent_color && ti === 0) ? v.accent_color : TH.red);
      rs.setProperty("--red-soft", TH.soft);
      rs.setProperty("--red-glow", TH.glow);
      rs.setProperty("--bg1", TH.bg1); rs.setProperty("--bg2", TH.bg2); rs.setProperty("--corner-glow", TH.corner);

      // ── Hook stat chip ──
      const hs = String(v.hook_stat || "").trim();
      if (hs) { const p = hs.split("|"); setText("s1chipv", (p[0] || "").trim()); const t = (p[1] || "").trim(); if (t) setText("s1chipt", t); else remove("s1chipt"); }
      else remove("s1chip");

      // ── Image cutout (2A: rỗng → remove; scene vẫn đẹp không ảnh) ──
      const heroUrl = String(v.img_hero || "").trim();
      if (heroUrl) { const im = document.getElementById("imgHero"); if (im) im.setAttribute("src", heroUrl); }
      else remove("imgHero");

      // ── S1 hook ──
      fillWords("s1l1", v.hook_line1); fillWords("s1l2", v.hook_line2);
      setText("s1key", v.hook_keyword); setText("s1sub", v.hook_sub);
      if (!String(v.hook_sub || "").trim()) remove("s1sub");

      // ── S2 big number (anti-fab: ẩn nếu không có số) ──
      const bigRaw = String(v.bignum_value || "").trim();
      const bigNum = Number(bigRaw.replace(/[^\d.-]/g, ""));
      const bigIsNum = bigRaw !== "" && Number.isFinite(bigNum);
      if (bigRaw === "") { remove("s2"); }
      else {
        setText("s2label", v.bignum_label); setText("s2unit", v.bignum_unit);
        if (!bigIsNum) setText("s2num", bigRaw);
        if (!String(v.bignum_label || "").trim()) remove("s2label");
        if (!String(v.bignum_unit || "").trim()) remove("s2unit");
      }

      // ── S3 donut (vẽ SVG arc, ẩn nếu rỗng) ──
      const donut = parseJSON(v.donut_segments, []);
      const donutOK = Array.isArray(donut) && donut.length >= 1 && donut.every((d) => Number(d && d.pct) > 0);
      const DONUT_PALETTE = [TH.red, "#f59e0b", "#1f9e9e", "#3b82f6", "#a855f7"];
      const R = 130, C2 = 2 * Math.PI * R; // circumference (viewBox 320, cx/cy 160)
      const donutArcs = [];
      if (!donutOK) { remove("s3d"); }
      else {
        setText("s3title", v.donut_title);
        if (!String(v.donut_title || "").trim()) remove("s3title");
        const svg = document.getElementById("s3svg");
        const NS = "http://www.w3.org/2000/svg";
        // track ring (mờ)
        const track = document.createElementNS(NS, "circle");
        track.setAttribute("cx", "160"); track.setAttribute("cy", "160"); track.setAttribute("r", String(R));
        track.setAttribute("fill", "none"); track.setAttribute("stroke", "rgba(255,255,255,0.08)"); track.setAttribute("stroke-width", "30");
        svg.appendChild(track);
        let offsetPct = 0;
        donut.slice(0, 5).forEach((seg, i) => {
          const pct = Math.max(0, Math.min(100, Number(seg.pct) || 0));
          const color = seg.color || DONUT_PALETTE[i % DONUT_PALETTE.length];
          const arc = document.createElementNS(NS, "circle");
          arc.setAttribute("cx", "160"); arc.setAttribute("cy", "160"); arc.setAttribute("r", String(R));
          arc.setAttribute("fill", "none"); arc.setAttribute("stroke", color); arc.setAttribute("stroke-width", "30");
          arc.setAttribute("stroke-linecap", "butt");
          const len = (pct / 100) * C2;
          arc.setAttribute("stroke-dasharray", len.toFixed(2) + " " + (C2 - len).toFixed(2));
          arc.setAttribute("stroke-dashoffset", String(-(offsetPct / 100) * C2));
          arc.setAttribute("transform", "rotate(0 160 160)");
          arc.id = "darc" + i; arc.style.opacity = "0";
          svg.appendChild(arc);
          donutArcs.push({ id: "darc" + i, len: len, off: -(offsetPct / 100) * C2 });
          offsetPct += pct;
          // legend
          const lg = document.createElement("div"); lg.className = "lg";
          const sw = document.createElement("span"); sw.className = "sw"; sw.style.background = color;
          const tx = document.createElement("span"); tx.textContent = String(seg.label || "") + " " + pct + "%";
          lg.appendChild(sw); lg.appendChild(tx);
          document.getElementById("s3legend").appendChild(lg);
        });
        // center % = segment lớn nhất
        const top = donut.reduce((m, d) => (Number(d.pct) > Number(m.pct) ? d : m), donut[0]);
        setText("s3clab", top.label || "");
      }

      // ── S4 bars (ẩn nếu < 2) ──
      const bars = parseJSON(v.data_bars, []);
      const barsOK = Array.isArray(bars) && bars.length >= 2;
      const barNums = [];
      if (!barsOK) { remove("s4b"); }
      else {
        setText("s4title", v.bars_title);
        if (!String(v.bars_title || "").trim()) remove("s4title");
        const host = document.getElementById("s4bars");
        const nums = bars.map((b) => { const x = Number(String(b.value).replace(/[^\d.-]/g, "")); return Number.isFinite(x) ? x : 0; });
        const maxv = Math.max.apply(null, nums.concat([1]));
        bars.slice(0, 4).forEach((b, i) => {
          const row = document.createElement("div"); row.className = "brow"; row.id = "brow" + i;
          const nm = document.createElement("div"); nm.className = "bname"; nm.textContent = String(b.label || "");
          const bbar = document.createElement("div"); bbar.className = "bbar";
          const track = document.createElement("div"); track.className = "btrack";
          const fill = document.createElement("div"); fill.className = "bfill"; fill.id = "bfill" + i;
          fill.style.width = Math.max(6, Math.round((nums[i] / maxv) * 100)) + "%";
          track.appendChild(fill);
          const vl = document.createElement("span"); vl.className = "bval";
          vl.textContent = String(b.value || "") + (b.unit ? " " + String(b.unit) : "");
          bbar.appendChild(track); bbar.appendChild(vl);
          row.appendChild(nm); row.appendChild(bbar); host.appendChild(row);
          barNums.push(i);
        });
      }

      // ── S5 multiplexer: flow > pictogram > news (cái nào có data thì hiện, còn lại remove) ──
      const flow = parseJSON(v.flow_nodes, []);
      const pic = parseJSON(v.pictogram, null);
      const news = parseJSON(v.news_cards, []);
      const PERSON = '<svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--red)"><circle cx="12" cy="7" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>';
      let s5mode = "none";
      if (Array.isArray(flow) && flow.length >= 2) s5mode = "flow";
      else if (pic && Number(pic.icons) > 0) s5mode = "pic";
      else if (Array.isArray(news) && news.length >= 2) s5mode = "news";

      if (s5mode === "none") { remove("s5"); }
      else {
        if (s5mode !== "flow") remove("s5flow");
        if (s5mode !== "pic") { remove("s5pic"); remove("s5piclabel"); }
        if (s5mode !== "news") remove("s5news");
        if (s5mode === "flow") {
          remove("s5title");
          const host = document.getElementById("s5flow");
          flow.slice(0, 4).forEach((label, i) => {
            const node = document.createElement("div"); node.className = "fnode"; node.id = "fnode" + i;
            const n = document.createElement("div"); n.className = "fn"; n.textContent = String(i + 1);
            const tx = document.createElement("span"); tx.textContent = String(label || "");
            node.appendChild(n); node.appendChild(tx); host.appendChild(node);
          });
        } else if (s5mode === "pic") {
          setText("s5title", "");  remove("s5title");
          const total = Math.max(1, Math.min(20, Math.round(Number(pic.icons) || 0)));
          const active = Math.max(0, Math.min(total, Math.round(Number(pic.active) || 0)));
          const host = document.getElementById("s5pic");
          for (let i = 0; i < total; i++) {
            const d = document.createElement("div"); d.className = "pi" + (i < active ? " on" : ""); d.id = "pi" + i;
            d.innerHTML = PERSON; host.appendChild(d);
          }
          setText("s5piclabel", pic.label || "");
          if (!String(pic.label || "").trim()) remove("s5piclabel");
        } else {
          remove("s5title");
          const host = document.getElementById("s5news");
          const rot = [-6, 5, -3, 7]; const tops = [40, 360, 700]; const lefts = [40, 420, 120];
          news.slice(0, 3).forEach((nc, i) => {
            const card = document.createElement("div"); card.className = "ncard"; card.id = "ncard" + i;
            card.style.top = tops[i % tops.length] + "px"; card.style.left = lefts[i % lefts.length] + "px";
            card.style.transform = "rotate(" + rot[i % rot.length] + "deg)";
            const t = document.createElement("div"); t.className = "nt"; t.textContent = String(nc.title || "");
            card.appendChild(t);
            if (nc.body) { const b = document.createElement("div"); b.className = "nb"; b.textContent = String(nc.body); card.appendChild(b); }
            host.appendChild(card);
          });
        }
      }

      // ── S6 point cards ──
      const levels = parseJSON(v.levels, []);
      if (!Array.isArray(levels) || levels.length === 0) { remove("s6"); }
      else {
        setText("s6title", v.levels_title);
        if (!String(v.levels_title || "").trim()) remove("s6title");
        const host = document.getElementById("s6cards");
        levels.slice(0, 3).forEach((lv) => {
          const card = document.createElement("div"); card.className = "card" + (lv.active ? " active" : "");
          const badge = document.createElement("div"); badge.className = "badge"; badge.textContent = lv.n == null ? "" : String(lv.n);
          const meta = document.createElement("div"); meta.className = "meta";
          if (lv.kicker) { const k = document.createElement("div"); k.className = "lv"; k.textContent = String(lv.kicker); meta.appendChild(k); }
          const name = document.createElement("div"); name.className = "name"; name.textContent = lv.label == null ? "" : String(lv.label); meta.appendChild(name);
          if (lv.desc) { const d = document.createElement("div"); d.className = "desc"; d.textContent = String(lv.desc); meta.appendChild(d); }
          card.appendChild(badge); card.appendChild(meta); host.appendChild(card);
        });
      }

      // ── S7 CTA ──
      setText("s7e1", v.cta_top);
      (function () {
        const e2 = document.getElementById("s7e2"); if (!e2) return; e2.textContent = "";
        const text = String(v.cta_keyword || ""); const hl = String(v.cta_hl || "").trim();
        const idx = hl ? text.toLowerCase().indexOf(hl.toLowerCase()) : -1;
        if (hl && idx >= 0) {
          if (idx > 0) e2.appendChild(document.createTextNode(text.slice(0, idx)));
          const sp = document.createElement("span"); sp.className = "e2hl"; sp.textContent = text.slice(idx, idx + hl.length); e2.appendChild(sp);
          const after = text.slice(idx + hl.length); if (after) e2.appendChild(document.createTextNode(after));
        } else e2.textContent = text;
      })();
      (function () {
        const e3 = document.getElementById("s7e3"); if (!e3) return;
        const emo = document.createElement("span"); emo.className = "emo"; emo.textContent = "👇"; e3.insertBefore(emo, e3.firstChild);
        setText("s7e3text", v.cta_sub || "");
      })();

      // ── AUTO-FIT chữ lớn (chống tràn) ──
      function fitText(id, maxPx, minPx, maxH) {
        const el = document.getElementById(id); if (!el || !String(el.textContent || "").trim()) return;
        el.style.lineHeight = el.style.lineHeight || "1.16";
        let lo = minPx, hi = maxPx, best = minPx;
        for (let i = 0; i < 12; i++) {
          const mid = (lo + hi) / 2; el.style.fontSize = mid + "px";
          const fitsW = el.scrollWidth <= el.clientWidth + 1; const fitsH = el.scrollHeight <= maxH;
          if (fitsW && fitsH) { best = mid; lo = mid; } else { hi = mid; }
        }
        el.style.fontSize = Math.floor(best) + "px";
      }
      // QC compact=1 → giảm trần cỡ chữ (vision-QC báo tràn ở vòng trước → render lại gọn hơn).
      const CF = String(v.compact || "") === "1" ? 0.82 : 1;
      const FT = (id, mx, mn, mh) => fitText(id, Math.round(mx * CF), mn, Math.round(mh * CF));
      FT("s1l1", 96, 44, 230); FT("s1l2", 96, 44, 230); FT("s1key", 150, 48, 380); FT("s1sub", 46, 26, 130);
      FT("s2bnum", 300, 80, 360); FT("s7e1", 84, 38, 210); FT("s7e2", 150, 44, 560); FT("s7e3text", 44, 24, 120);

      // ── Duration scaling: tile [0,BASE] → [0,dur] (khớp voice-over) ──
      const BASE = 20.5;
      const dur = parseFloat(v.duration) || BASE;
      const k = dur / BASE;
      const P = (t) => +(t * k).toFixed(3);
      ["bgbase", "s1", "s2", "s3d", "s4b", "s5", "s6", "s7"].forEach((id) => {
        const el = document.getElementById(id); if (!el) return;
        const st = parseFloat(el.getAttribute("data-start")) || 0;
        const du = parseFloat(el.getAttribute("data-duration")) || 0;
        el.setAttribute("data-start", String(+(st * k).toFixed(3)));
        el.setAttribute("data-duration", String(+(du * k).toFixed(3)));
      });

      // ── GSAP timeline (paused, deterministic) ──
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      gsap.defaults({ ease: "power3.out" });

      /* S1 (base 0→3) */
      tl.fromTo("#s1 .motif", { scale: 0.78, opacity: 0 }, { scale: 1, opacity: 0.18, duration: 0.9, ease: "power2.out" }, P(0.05));
      if (document.getElementById("s1ring"))
        tl.fromTo("#s1ring", { rotation: -10, scale: 0.9, opacity: 0 }, { rotation: 10, scale: 1, opacity: 1, duration: P(2.8), ease: "none" }, P(0.1));
      if (document.getElementById("s1chip"))
        tl.fromTo("#s1chip", { scale: 0.5, opacity: 0, y: -12 }, { scale: 1, opacity: 1, y: 0, duration: 0.55, ease: "back.out(1.8)" }, P(0.35));
      if (document.getElementById("imgHero"))
        tl.fromTo("#imgHero", { scale: 1.0, opacity: 0, x: 40 }, { scale: 1.06, opacity: 1, x: 0, duration: P(2.6), ease: "power2.out" }, P(0.3));
      tl.from("#s1 .l1 .word", { yPercent: 120, opacity: 0, duration: 0.5, stagger: 0.08 }, P(0.15));
      tl.from("#s1 .l2 .word", { yPercent: 120, opacity: 0, duration: 0.5, stagger: 0.08 }, P(0.45));
      tl.fromTo("#s1key", { scale: 0.4, opacity: 0, filter: "blur(8px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.8)" }, P(1.1));
      if (document.getElementById("s1sub")) tl.fromTo("#s1sub", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, P(1.8));

      /* S2 big number (base 3→6) */
      if (document.getElementById("s2")) {
        tl.from("#s2label", { y: 20, opacity: 0, duration: 0.4 }, P(3.2));
        if (bigIsNum) {
          const cc = { v: 0 };
          tl.to(cc, { v: bigNum, duration: 1.2, ease: "power2.out",
            onUpdate: () => { const e = document.getElementById("s2num"); if (e) e.textContent = Math.round(cc.v).toLocaleString("vi-VN"); } }, P(3.4));
        } else {
          tl.from("#s2num", { scale: 0.6, opacity: 0, duration: 0.6, ease: "back.out(1.6)" }, P(3.4));
        }
        tl.from("#s2unit", { y: 20, opacity: 0, duration: 0.4 }, P(4.7));
        tl.to("#s2 .bnum", { scale: 1.04, duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut", overwrite: "auto" }, P(5.0));
      }

      /* S3 donut (base 6→9.2) — arc draw qua strokeDashoffset, seekable */
      if (document.getElementById("s3d")) {
        tl.from("#s3title", { y: 20, opacity: 0, duration: 0.4 }, P(6.2));
        donutArcs.forEach((d, i) => {
          // vẽ cung: từ ẩn (dashoffset đẩy hết) → đúng vị trí off
          tl.set("#" + d.id, { opacity: 1 }, P(6.4 + i * 0.35));
          tl.fromTo("#" + d.id, { strokeDashoffset: d.off + d.len }, { strokeDashoffset: d.off, duration: 0.7, ease: "power2.out" }, P(6.4 + i * 0.35));
        });
        const topPct = Math.max.apply(null, donut.map((d) => Number(d.pct) || 0));
        const pc = { v: 0 };
        tl.to(pc, { v: topPct, duration: 0.9, ease: "power1.out",
          onUpdate: () => { const e = document.getElementById("s3pct"); if (e) e.textContent = Math.round(pc.v); } }, P(6.5));
        tl.from("#s3legend .lg", { y: 16, opacity: 0, duration: 0.4, stagger: 0.1 }, P(7.6));
      }

      /* S4 bars (base 9.2→12.2) */
      if (document.getElementById("s4b")) {
        tl.from("#s4title", { y: 20, opacity: 0, duration: 0.4 }, P(9.4));
        barNums.forEach((i) => {
          tl.from("#brow" + i, { x: -50, opacity: 0, duration: 0.5 }, P(9.5 + i * 0.25));
          tl.fromTo("#bfill" + i, { scaleX: 0 }, { scaleX: 1, duration: 0.9, ease: "power3.out" }, P(9.7 + i * 0.25));
        });
      }

      /* S5 (base 12.2→15) */
      if (document.getElementById("s5")) {
        if (document.getElementById("s5title")) tl.from("#s5title", { y: 20, opacity: 0, duration: 0.4 }, P(12.4));
        if (s5mode === "flow") tl.from("#s5 .fnode", { x: -40, opacity: 0, duration: 0.45, stagger: 0.14 }, P(12.5));
        else if (s5mode === "pic") {
          tl.from("#s5 .pic .pi", { scale: 0, opacity: 0, duration: 0.4, stagger: 0.04, ease: "back.out(2)" }, P(12.5));
          if (document.getElementById("s5piclabel")) tl.from("#s5piclabel", { y: 18, opacity: 0, duration: 0.4 }, P(13.8));
        } else if (s5mode === "news") tl.from("#s5 .ncard", { y: 60, opacity: 0, rotation: 0, duration: 0.5, stagger: 0.16, ease: "back.out(1.4)" }, P(12.5));
      }

      /* S6 cards (base 15→17.8) */
      if (document.getElementById("s6")) {
        tl.from("#s6 .title", { y: 30, opacity: 0, duration: 0.5 }, P(15.2));
        tl.from("#s6 .card", { x: -60, opacity: 0, duration: 0.5, stagger: 0.18 }, P(15.5));
        if (document.querySelector("#s6 .card.active"))
          tl.fromTo("#s6 .card.active", { boxShadow: "0 0 0px rgba(225,29,42,0)" }, { boxShadow: "0 0 90px rgba(225,29,42,0.55)", duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut" }, P(16.6));
      }

      /* S7 CTA (base 17.8→20.5) */
      tl.from("#s7e1", { y: 30, opacity: 0, duration: 0.5 }, P(18.0));
      tl.fromTo("#s7e2", { scale: 0.5, opacity: 0, filter: "blur(8px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.8)" }, P(18.3));
      tl.to("#s7e2", { scale: 1.05, duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut", overwrite: "auto" }, P(19.1));
      if (document.getElementById("s7e3")) tl.from("#s7e3", { y: 24, opacity: 0, duration: 0.5 }, P(19.0));

      tl.to({}, { duration: 0.001 }, Math.max(0, dur - 0.001));
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
