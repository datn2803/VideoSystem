  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../assets/fonts/be-vietnam-pro.css" />
    <script src="../vendor/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden; background: #f3f0fb;
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
      }
      :root {
        --bg1: #f4f0fc; --bg2: #e9e3f8; --accent: #7c3aed; --accent2: #a78bfa;
        --ink: #1e1b2e; --sub: #6b6480; --card: #ffffff; --glow: rgba(124,58,237,0.16);
      }
      #root { position: relative; width: 1080px; height: 1920px; }

      /* ── Scene base ── */
      .scene { position: absolute; inset: 0; width: 1080px; height: 1920px; overflow: hidden; display: flex; }
      /* center (Hero, CTA) */
      .scene.center { flex-direction: column; justify-content: center; align-items: center; padding: 0 80px; text-align: center; }
      /* left (bố cục mẫu): bám lề trái, KHỐI căn GIỮA dọc (hết trống đáy) */
      .scene.left { flex-direction: column; justify-content: center; align-items: stretch; padding: 130px 72px; text-align: left; }
      .scene.left .stack { display: flex; flex-direction: column; gap: 32px; width: 100%; }

      .bg-light {
        background:
          radial-gradient(90% 60% at 50% 8%, var(--glow) 0%, rgba(255,255,255,0) 55%),
          radial-gradient(80% 50% at 85% 100%, rgba(245,158,11,0.07) 0%, rgba(255,255,255,0) 50%),
          linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 100%);
      }
      .dotgrid {
        position: absolute; inset: 0; pointer-events: none;
        background-image: radial-gradient(rgba(124,58,237,0.06) 1.4px, transparent 1.4px);
        background-size: 46px 46px;
        -webkit-mask-image: radial-gradient(85% 75% at 50% 45%, #000 30%, transparent 82%);
        mask-image: radial-gradient(85% 75% at 50% 45%, #000 30%, transparent 82%);
      }

      /* ── Eyebrow: dot-pill (center) + icon-square (left) ── */
      .eyebrow { display: inline-flex; align-items: center; gap: 12px; }
      .eyebrow.dot { align-self: center; background: rgba(124,58,237,0.10); color: var(--accent);
        font-weight: 800; font-size: 32px; letter-spacing: 2px; text-transform: uppercase; padding: 12px 26px; border-radius: 999px; }
      .eyebrow.dot::before { content: ""; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); }
      .eyebrow.icon .ico { width: 44px; height: 44px; border-radius: 12px; background: var(--accent);
        display: flex; align-items: center; justify-content: center; }
      .eyebrow.icon .ico svg { width: 24px; height: 24px; }
      .eyebrow.icon .lbl { color: var(--sub); font-weight: 800; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; }

      /* ── Headline ── */
      .h-title { color: var(--ink); font-weight: 900; font-size: 76px; line-height: 1.08; letter-spacing: -0.5px; }
      .h-title .ac { color: var(--accent); }

      /* ── Bento card primitives ── */
      .bento { background: var(--card); border-radius: 22px; border: 1px solid rgba(120,90,210,0.08);
        box-shadow: 0 12px 34px rgba(90,70,170,0.12); }
      .bento-accent { background: linear-gradient(150deg, var(--accent), var(--accent2)); color: #fff; border-radius: 22px; }

      /* pill2 (2×2) — icon-led (đúng style donnie) */
      .pill2 { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
      .pill { display: flex; align-items: center; gap: 22px; padding: 42px 32px; will-change: transform, opacity; }
      .pill .pic { flex: 0 0 72px; width: 72px; height: 72px; border-radius: 18px; background: rgba(124,58,237,0.12);
        display: flex; align-items: center; justify-content: center; will-change: transform; }
      .pill .pic svg { width: 38px; height: 38px; stroke: var(--accent); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .pill .pn { flex: 0 0 48px; width: 48px; height: 48px; border-radius: 14px; background: rgba(124,58,237,0.12);
        color: var(--accent); font-weight: 900; font-size: 26px; display: flex; align-items: center; justify-content: center; }
      .pill .pt { color: var(--ink); font-weight: 700; font-size: 40px; line-height: 1.18; }

      /* listcard */
      .listcard { display: flex; flex-direction: column; gap: 20px; }
      .lrow { display: flex; align-items: flex-start; gap: 18px; padding: 26px 30px; will-change: transform, opacity; }
      .lrow .bullet { flex: 0 0 16px; width: 16px; height: 16px; margin-top: 12px; border-radius: 50%; background: var(--accent); }
      .lrow .lt { color: var(--ink); font-weight: 600; font-size: 38px; line-height: 1.25; }

      /* callout (thanh tím) */
      .callout { background: rgba(124,58,237,0.08); border-left: 8px solid var(--accent); border-radius: 18px;
        padding: 40px 38px; color: var(--ink); font-weight: 600; font-size: 44px; line-height: 1.32; will-change: transform, opacity; }
      .callout b { color: var(--accent); font-weight: 900; }

      /* emph (gradient) */
      .emph { padding: 50px 44px; will-change: transform, opacity; }
      .emph .eb { color: rgba(255,255,255,0.85); font-weight: 800; font-size: 30px; letter-spacing: 2px; text-transform: uppercase; }
      .emph .em { color: #fff; font-weight: 800; font-size: 62px; line-height: 1.14; margin-top: 14px; }

      /* compare (2 cột) */
      .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; width: 100%; align-items: stretch; }
      .ccard { padding: 46px 38px; text-align: left; will-change: transform, opacity; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
      .ccard .ct { font-weight: 800; font-size: 48px; line-height: 1.1; }
      .ccard .cs { font-weight: 500; font-size: 36px; line-height: 1.3; margin-top: 10px; }
      .ccard.l { color: var(--ink); } .ccard.l .cs { color: var(--sub); }
      .ccard.r .ct, .ccard.r .cs { color: #fff; }

      /* progress bars */
      .pbars { display: flex; flex-direction: column; gap: 36px; }
      .pbar { will-change: transform, opacity; padding: 38px 34px; }
      .pbar .pl { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
      .pbar .pn { color: var(--ink); font-weight: 800; font-size: 42px; }
      .pbar .pv { color: var(--accent); font-weight: 900; font-size: 46px; white-space: nowrap; font-variant-numeric: tabular-nums; }
      .pbar .ptrack { position: relative; height: 44px; border-radius: 22px; background: rgba(124,58,237,0.10); overflow: hidden; }
      .pbar .pfill { position: relative; height: 100%; border-radius: 18px; background: linear-gradient(90deg, var(--accent2), var(--accent));
        transform-origin: left center; transform: scaleX(0); will-change: transform; overflow: hidden; }
      /* sheen: vệt sáng quét qua thanh sau khi đầy (motion-graphics, không tĩnh) */
      .pbar .sheen { position: absolute; top: 0; bottom: 0; width: 120px; transform: translateX(-160px) skewX(-18deg);
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0) 100%); will-change: transform; }

      /* bignum */
      .bignum { display: flex; align-items: flex-start; flex-wrap: nowrap; gap: 0.04em; line-height: 0.92;
        color: var(--accent); font-weight: 900; font-size: 280px; letter-spacing: -4px; white-space: nowrap; font-variant-numeric: tabular-nums; }
      .bignum .bu { font-size: 0.42em; font-weight: 800; color: var(--accent2); align-self: flex-start; margin-top: 0.12em; }
      .blabel { color: var(--sub); font-weight: 600; font-size: 40px; }

      /* glow blob nền — trôi nhẹ suốt clip (nền "sống", không phẳng lì) */
      .glowblob { position: absolute; width: 820px; height: 820px; border-radius: 50%; left: 6%; top: 16%;
        background: radial-gradient(circle, var(--glow) 0%, rgba(255,255,255,0) 68%);
        filter: blur(50px); opacity: 0.7; pointer-events: none; will-change: transform; }

      /* ── S1 hero (center) ── */
      #s1 .key { display: block; color: var(--accent); font-weight: 900; font-size: 150px; line-height: 0.98; letter-spacing: -1px; }
      #s1 .l { display: block; color: var(--ink); font-weight: 900; font-size: 78px; line-height: 1.05; }
      #s1 .sub { display: block; color: var(--sub); font-weight: 600; font-size: 44px; margin-top: 18px; }
      #s1 .herocard { width: 560px; height: 540px; margin-top: 44px; padding: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; will-change: transform, opacity; }
      #s1 .herocard img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 24px 40px rgba(90,70,170,0.25)); }

      /* ── S7 CTA (center) ── */
      #s7 .e1 { color: var(--ink); font-weight: 800; font-size: 80px; line-height: 1.14; }
      #s7 .e2 { color: var(--accent); font-weight: 900; font-size: 150px; line-height: 1.12; letter-spacing: -1px; margin-top: 18px; will-change: transform; }
      #s7 .e2 .e2hl { color: var(--accent2); }
      #s7 .e3 { color: var(--sub); font-weight: 700; font-size: 44px; margin-top: 44px; display: flex; align-items: center; justify-content: center; gap: 14px; }
      #s7 .e3 .emo { font-size: 56px; line-height: 1; }
    </style>
  </head>

  <body>
    <div id="root" class="composition" data-composition-id="main" data-start="0" data-duration="18.5" data-width="1080" data-height="1920">
      <audio id="vo" class="clip" data-start="0" data-duration="18.5" data-track-index="9" data-volume="1" src=""></audio>

      <div id="bgbase" class="scene bg-light clip" data-start="0" data-duration="18.5" data-track-index="0">
        <div class="glowblob" id="glowblob"></div>
        <div class="dotgrid"></div>
      </div>

      <!-- S1 Hero (center): eyebrow → keyword → headline → sub → herocard 3D -->
      <div id="s1" class="scene center bg-light clip" data-start="0" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="eyebrow dot" id="s1eb"></div>
        <span class="key" id="s1key"></span>
        <span class="l" id="s1l1"></span>
        <span class="l" id="s1l2"></span>
        <span class="sub" id="s1sub"></span>
        <div class="herocard bento" id="heroWrap"><img id="imgHero" src="" alt="" /></div>
      </div>

      <!-- S2 Big number (left) -->
      <div id="s2" class="scene left bg-light clip" data-start="3.7" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="stack">
          <div class="eyebrow icon" id="s2eb"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg></span><span class="lbl" id="s2lbl"></span></div>
          <div class="bignum" id="s2bnum"><span id="s2num">0</span><span class="bu" id="s2unit"></span></div>
          <div class="blabel" id="s2label"></div>

      </div>

      <!-- S3 Progress bars (left) -->
      <div id="s4b" class="scene left bg-light clip" data-start="7.4" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="stack">
          <div class="eyebrow icon" id="s4eb"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="8"/><rect x="13" y="5" width="3" height="13"/></svg></span><span class="lbl" id="s4lbl"></span></div>
          <div class="pbars" id="s4bars"></div>
        </div>
      </div>

      <!-- S4 Pills 2×2 (left) -->
      <div id="s6" class="scene left bg-light clip" data-start="11.1" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="stack">
          <div class="eyebrow icon" id="s6eb"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span><span class="lbl" id="s6lbl"></span></div>
          <div class="pill2" id="s6pills"></div>
        </div>
      </div>

      <!-- S_emph: callout bar + nguyên tắc (gradient card) — left -->
      <div id="s_emph" class="scene left bg-light clip" data-start="0" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="stack">
          <div class="callout" id="emphCallout"></div>
          <div class="emph bento-accent" id="emphCard"><div class="eb">Nguyên tắc</div><div class="em" id="emphPrinciple"></div></div>
        </div>
      </div>

      <!-- S_cmp: so sánh 2 cột — left -->
      <div id="s_cmp" class="scene left bg-light clip" data-start="0" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="stack">
          <div class="eyebrow icon" id="cmpEb"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7h8M8 12h8M8 17h8"/></svg></span><span class="lbl">So sánh</span></div>
          <div class="compare" id="cmpGrid"></div>
        </div>
      </div>

      <!-- S5 CTA (center) -->
      <div id="s7" class="scene center bg-light clip" data-start="14.8" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="e1" id="s7e1"></div>
        <div class="e2" id="s7e2"></div>
        <div class="e3" id="s7e3"><span id="s7e3text"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><path d="M12 5v14"/><path d="m6 13 6 6 6-6"/></svg></div>
      </div>
    </div>

    <script>
      const v = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val == null ? "" : String(val); };
      const fillWords = (id, phrase) => {
        const el = document.getElementById(id); if (!el) return;
        el.textContent = "";
        String(phrase || "").trim().split(/\s+/).filter(Boolean).forEach((w, i) => {
          if (i > 0) el.appendChild(document.createTextNode(" "));
          const sp = document.createElement("span"); sp.className = "word"; sp.style.display = "inline-block"; sp.textContent = w; el.appendChild(sp);
        });
      };
      const parseJSON = (s, fb) => { try { const p = JSON.parse(s); return p == null ? fb : p; } catch (e) { return fb; } };
      const remove = (id) => { const el = document.getElementById(id); if (el) el.remove(); };
      const hideIfEmpty = (id, val) => { if (!String(val || "").trim()) remove(id); else setText(id, val); };

      // ── Bộ icon line (đúng vibe donnie): chọn theo TỪ KHOÁ trong nhãn, fallback theo index ──
      const ICONS = {
        clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
        refresh: '<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/>',
        chart: '<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7"/><rect x="13" y="6" width="3" height="12"/>',
        target: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4"/>',
        check: '<circle cx="12" cy="12" r="9"/><path d="m8.4 12 2.5 2.5 4.7-5"/>',
        shield: '<path d="M12 3 5 6v5c0 4 3 7 7 8 4-1 7-4 7-8V6l-7-3z"/>',
        layers: '<path d="m12 3 9 5-9 5-9-5 9-5z"/><path d="m3 13 9 5 9-5"/>',
        puzzle: '<path d="M10 4a2 2 0 1 1 4 0h3a1 1 0 0 1 1 1v3a2 2 0 1 1 0 4v3a1 1 0 0 1-1 1h-3a2 2 0 1 0-4 0H7a1 1 0 0 1-1-1v-3a2 2 0 1 1 0-4V5a1 1 0 0 1 1-1h3z"/>',
        rocket: '<path d="M5 15c-1 1-1 4-1 4s3 0 4-1m10-14c-3 0-7 2-9 6l-1 3 3-1c4-2 6-6 6-9z"/><circle cx="14" cy="9" r="1.3"/>',
        database: '<ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v12c0 1.7 3.6 3 8 3s8-1.3 8-3V6"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/>',
        spark: '<path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z"/>',
        bolt: '<path d="M13 2 4 14h7l-1 8 10-12h-7z"/>',
      };
      const ICON_RULES = [
        [/thời gian|nhanh|chậm|tốc độ|giờ|phút/i, "clock"],
        [/lặp|tự động|định kỳ|vòng|quy trình|workflow/i, "refresh"],
        [/đo lường|kết quả|hiệu quả|tăng|giảm|số liệu|dữ liệu|data|doanh/i, "chart"],
        [/pattern|nhận diện|phân tích|insight|mục tiêu|target|tầm nhìn/i, "target"],
        [/chính xác|đúng|chuẩn|kiểm|đánh giá|đảm bảo/i, "check"],
        [/bảo mật|an toàn|rủi ro|bảo vệ/i, "shield"],
        [/xây|hệ thống|kiến trúc|module|cấu trúc|nền tảng/i, "layers"],
        [/tích hợp|kết nối|công cụ|api|tool/i, "puzzle"],
        [/triển khai|ra mắt|bứt phá|tăng trưởng|scale|mở rộng/i, "rocket"],
        [/lưu trữ|bộ nhớ|kho|memory|context|tài liệu/i, "database"],
        [/ý tưởng|sáng tạo|ai|thông minh|tối ưu|gợi ý/i, "spark"],
      ];
      const ICON_CYCLE = ["target", "bolt", "refresh", "chart", "check", "layers", "puzzle", "rocket"];
      function pickIconKey(label, i) {
        const s = String(label || "");
        for (const [re, key] of ICON_RULES) if (re.test(s)) return key;
        return ICON_CYCLE[i % ICON_CYCLE.length];
      }
      function makeIconSVG(key) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.innerHTML = ICONS[key] || ICONS.spark;
        return svg;
      }

      // ── THEME (light) ──
      const THEMES = [
        { bg1: "#f4f0fc", bg2: "#e9e3f8", accent: "#7c3aed", accent2: "#a78bfa", ink: "#1e1b2e", sub: "#6b6480", card: "#ffffff", glow: "rgba(124,58,237,0.16)" },
        { bg1: "#f8f2e9", bg2: "#f1e7d6", accent: "#7c3aed", accent2: "#f59e0b", ink: "#2b2238", sub: "#6b6480", card: "#fffdfa", glow: "rgba(124,58,237,0.14)" },
        { bg1: "#eef1fb", bg2: "#e3e8f7", accent: "#6d28d9", accent2: "#60a5fa", ink: "#1b1d2e", sub: "#646b80", card: "#ffffff", glow: "rgba(109,40,217,0.15)" },
      ];
      const ti = Math.max(0, Math.min(THEMES.length - 1, parseInt(v.theme, 10) || 0));
      const TH = THEMES[ti];
      const rs = document.documentElement.style;
      rs.setProperty("--bg1", TH.bg1); rs.setProperty("--bg2", TH.bg2);
      rs.setProperty("--accent", TH.accent); rs.setProperty("--accent2", TH.accent2);
      rs.setProperty("--ink", TH.ink); rs.setProperty("--sub", TH.sub);
      rs.setProperty("--card", TH.card); rs.setProperty("--glow", TH.glow);

      // ── S1 hero ──
      hideIfEmpty("s1eb", v.hook_eyebrow);
      setText("s1key", v.hook_keyword);
      if (!String(v.hook_keyword || "").trim()) remove("s1key");
      fillWords("s1l1", v.hook_line1); fillWords("s1l2", v.hook_line2);
      if (!String(v.hook_line2 || "").trim()) remove("s1l2");
      hideIfEmpty("s1sub", v.hook_sub);
      const heroUrl = String(v.img_hero || "").trim();
      if (heroUrl) { const im = document.getElementById("imgHero"); if (im) im.setAttribute("src", heroUrl); }
      else remove("heroWrap");

      // ── S2 big number (left) — ẩn nếu không có số ──
      const bigRaw = String(v.bignum_value || "").trim();
      const bigNum = Number(bigRaw.replace(/[^\d.-]/g, ""));
      const bigIsNum = bigRaw !== "" && Number.isFinite(bigNum);
      if (bigRaw === "") { remove("s2"); }
      else {
        hideIfEmpty("s2lbl", v.bignum_label); if (!String(v.bignum_label || "").trim()) remove("s2eb");
        if (!bigIsNum) setText("s2num", bigRaw);
        if (!String(v.bignum_unit || "").trim()) remove("s2unit"); else setText("s2unit", v.bignum_unit);
        hideIfEmpty("s2label", v.bignum_label);
      }

      // ── S3 progress bars (left) — ẩn nếu < 2 ──
      const bars = parseJSON(v.data_bars, []);
      const barsOK = Array.isArray(bars) && bars.length >= 2;
      const barNums = [];
      if (!barsOK) { remove("s4b"); }
      else {
        hideIfEmpty("s4lbl", v.bars_title); if (!String(v.bars_title || "").trim()) remove("s4eb");
        const host = document.getElementById("s4bars");
        const nums = bars.map((b) => { const x = Number(String(b.value).replace(/[^\d.-]/g, "")); return Number.isFinite(x) ? x : 0; });
        const maxv = Math.max.apply(null, nums.concat([1]));
        bars.slice(0, 4).forEach((b, i) => {
          const row = document.createElement("div"); row.className = "pbar bento"; row.id = "brow" + i;
          const pl = document.createElement("div"); pl.className = "pl";
          const pn = document.createElement("span"); pn.className = "pn"; pn.textContent = String(b.label || "");
          const pv = document.createElement("span"); pv.className = "pv"; pv.textContent = String(b.value || "") + (b.unit ? " " + String(b.unit) : "");
          pl.appendChild(pn); pl.appendChild(pv);
          const track = document.createElement("div"); track.className = "ptrack";
          const fill = document.createElement("div"); fill.className = "pfill"; fill.id = "bfill" + i;
          fill.style.width = Math.max(6, Math.round((nums[i] / maxv) * 100)) + "%";
          const sheen = document.createElement("div"); sheen.className = "sheen"; sheen.id = "bsheen" + i;
          fill.appendChild(sheen);
          track.appendChild(fill);
          row.appendChild(pl); row.appendChild(track); host.appendChild(row);
          barNums.push(i);
        });
      }

      // ── S4 pills 2×2 (left) — ưu tiên `pills` (4 distinct), fallback `levels` ──
      const pillsData = parseJSON(v.pills, []);
      const pillSrc = (Array.isArray(pillsData) && pillsData.length) ? pillsData : parseJSON(v.levels, []);
      if (!Array.isArray(pillSrc) || pillSrc.length === 0) { remove("s6"); }
      else {
        const ebText = String(v.pills_title || v.levels_title || "").trim();
        if (!ebText) remove("s6eb"); else setText("s6lbl", ebText);
        const host = document.getElementById("s6pills");
        pillSrc.slice(0, 4).forEach((lv, i) => {
          const pill = document.createElement("div"); pill.className = "pill bento"; pill.id = "pill" + i;
          const pic = document.createElement("div"); pic.className = "pic";
          pic.appendChild(makeIconSVG(pickIconKey(lv.label, i)));
          const pt = document.createElement("div"); pt.className = "pt"; pt.textContent = lv.label == null ? "" : String(lv.label);
          pill.appendChild(pic); pill.appendChild(pt); host.appendChild(pill);
        });
      }

      // ── S_emph: callout bar + nguyên tắc (gradient) — ẩn cả scene nếu cả 2 rỗng ──
      const calloutTxt = String(v.callout || "").trim();
      const principleTxt = String(v.principle || "").trim();
      if (!calloutTxt && !principleTxt) { remove("s_emph"); }
      else {
        if (calloutTxt) setText("emphCallout", calloutTxt); else remove("emphCallout");
        if (principleTxt) setText("emphPrinciple", principleTxt); else remove("emphCard");
      }

      // ── S_cmp: so sánh 2 cột — ẩn nếu thiếu data ──
      const cmp = parseJSON(v.compare, null);
      const cmpOK = cmp && String(cmp.leftTitle || "").trim() && Array.isArray(cmp.leftItems) && cmp.leftItems.length;
      if (!cmpOK) { remove("s_cmp"); }
      else {
        const grid = document.getElementById("cmpGrid");
        const mk = (side, title, items) => {
          const c = document.createElement("div"); c.className = "ccard " + side + (side === "r" ? " bento-accent" : " bento");
          const t = document.createElement("div"); t.className = "ct"; t.textContent = String(title || ""); c.appendChild(t);
          (items || []).slice(0, 3).forEach((it) => { const d = document.createElement("div"); d.className = "cs"; d.textContent = "• " + String(it); c.appendChild(d); });
          return c;
        };
        grid.appendChild(mk("l", cmp.leftTitle, cmp.leftItems));
        grid.appendChild(mk("r", cmp.rightTitle || "Với AI", cmp.rightItems || []));
      }

      // ── S5 CTA (center) ──
      setText("s7e1", v.cta_top);
      (function () {
        const e2 = document.getElementById("s7e2"); if (!e2) return; e2.textContent = "";
        const text = String(v.cta_keyword || ""); const hl = String(v.cta_hl || "").trim();
        const idx = hl ? text.toLowerCase().indexOf(hl.toLowerCase()) : -1;
        if (hl && idx >= 0) {
          if (idx > 0) e2.appendChild(document.createTextNode(text.slice(0, idx)));
          const sp = document.createElement("span"); sp.className = "e2hl"; sp.textContent = text.slice(idx, idx + hl.length); e2.appendChild(sp);
          const after = text.slice(idx + hl.length); if (after) e2.appendChild(document.createTextNode(after));
        } else e2.textContent = text;
      })();
      (function () {
        const e3 = document.getElementById("s7e3"); if (!e3) return;
        const emo = document.createElement("span"); emo.className = "emo"; emo.textContent = "👇"; e3.insertBefore(emo, e3.firstChild);
        setText("s7e3text", v.cta_sub || "");
      })();

      // ── AUTO-FIT chữ lớn ──
      function fitText(id, maxPx, minPx, maxH) {
        const el = document.getElementById(id); if (!el || !String(el.textContent || "").trim()) return;
        el.style.lineHeight = el.style.lineHeight || "1.12";
        let lo = minPx, hi = maxPx, best = minPx;
        for (let i = 0; i < 12; i++) {
          const mid = (lo + hi) / 2; el.style.fontSize = mid + "px";
          const fitsW = el.scrollWidth <= el.clientWidth + 1; const fitsH = el.scrollHeight <= maxH;
          if (fitsW && fitsH) { best = mid; lo = mid; } else { hi = mid; }
        }
        el.style.fontSize = Math.floor(best) + "px";
      }
      const CF = String(v.compact || "") === "1" ? 0.82 : 1;
      const FT = (id, mx, mn, mh) => fitText(id, Math.round(mx * CF), mn, Math.round(mh * CF));
      FT("s1key", 150, 48, 320); FT("s1l1", 78, 40, 180); FT("s1l2", 78, 40, 180); FT("s1sub", 44, 24, 120);
      FT("s2bnum", 280, 80, 340); FT("s7e1", 80, 36, 200); FT("s7e2", 150, 44, 520); FT("s7e3text", 44, 24, 120);

      // ── Tile CHỈ scene đang hiển thị → lấp đầy toàn bộ voice ──
      const total = parseFloat(v.duration) || 18.5;
      const order = ["s1", "s2", "s4b", "s6", "s_emph", "s_cmp", "s7"];
      const visible = order.filter((id) => document.getElementById(id));
      const N = Math.max(1, visible.length);
      const win = total / N;
      const startOf = {};
      visible.forEach((id, i) => {
        const el = document.getElementById(id);
        const s = +(i * win).toFixed(3);
        el.setAttribute("data-start", String(s));
        el.setAttribute("data-duration", win.toFixed(3));
        startOf[id] = s;
      });
      const bgEl = document.getElementById("bgbase");
      if (bgEl) { bgEl.setAttribute("data-start", "0"); bgEl.setAttribute("data-duration", total.toFixed(3)); }
      const has = (id) => startOf[id] != null;

      // ── GSAP timeline (paused, deterministic) — snappy, duration cố định ──
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      gsap.defaults({ ease: "power3.out" });

      // Nền SỐNG: glow blob trôi chậm + phình nhẹ suốt clip (transform-only → rẻ trên software render).
      if (document.getElementById("glowblob"))
        tl.fromTo("#glowblob", { x: -40, y: -20, scale: 0.92 },
          { x: 260, y: 200, scale: 1.18, duration: Math.max(2, total / 2), ease: "sine.inOut", yoyo: true, repeat: 1 }, 0);

      // Cross-fade scene (RẺ — chỉ opacity).
      visible.forEach((id, i) => {
        const sel = "#" + id, s = startOf[id];
        tl.fromTo(sel, { opacity: 0 }, { opacity: 1, duration: 0.28, ease: "power1.out" }, s);
        if (i < N - 1) tl.to(sel, { opacity: 0, duration: 0.22, ease: "power1.in" }, s + win - 0.22);
      });

      /* S1 hero */
      if (has("s1")) {
        const s = startOf.s1;
        if (document.getElementById("s1eb")) tl.from("#s1eb", { y: 16, opacity: 0, duration: 0.4 }, s + 0.1);
        if (document.getElementById("s1key"))
          tl.fromTo("#s1key", { scale: 0.55, opacity: 0, filter: "blur(8px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.7)" }, s + 0.2);
        tl.from("#s1l1 .word", { yPercent: 120, opacity: 0, duration: 0.45, stagger: 0.07 }, s + 0.55);
        if (document.getElementById("s1l2")) tl.from("#s1l2 .word", { yPercent: 120, opacity: 0, duration: 0.45, stagger: 0.07 }, s + 0.8);
        if (document.getElementById("s1sub")) tl.fromTo("#s1sub", { y: 22, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45 }, s + 1.1);
        if (document.getElementById("heroWrap")) {
          tl.fromTo("#heroWrap", { scale: 0.94, opacity: 0, y: 24 }, { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "back.out(1.4)" }, s + 0.5);
          // Mid-scene: thẻ 3D "thở" nhẹ (breathing float) — không tĩnh.
          tl.to("#heroWrap", { y: "-=16", duration: Math.max(1, win / 2), yoyo: true, repeat: 1, ease: "sine.inOut" }, s + 1.2);
        }
      }

      /* S2 big number */
      if (has("s2")) {
        const s = startOf.s2;
        if (document.getElementById("s2eb")) tl.from("#s2eb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        if (bigIsNum) {
          const cc = { v: 0 };
          tl.to(cc, { v: bigNum, duration: 0.6, ease: "power3.out",
            onUpdate: () => { const e = document.getElementById("s2num"); if (e) e.textContent = Math.round(cc.v).toLocaleString("vi-VN"); } }, s + 0.2);
        } else {
          tl.from("#s2num", { scale: 0.6, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, s + 0.2);
        }
        if (document.getElementById("s2label")) tl.from("#s2label", { y: 16, opacity: 0, duration: 0.35 }, s + 0.8);
        tl.to("#s2bnum", { scale: 1.03, duration: Math.max(1, win / 2), yoyo: true, repeat: 1, ease: "sine.inOut", overwrite: "auto" }, s + 1.0);
      }

      /* S3 progress bars */
      if (has("s4b")) {
        const s = startOf.s4b;
        if (document.getElementById("s4eb")) tl.from("#s4eb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        barNums.forEach((i) => {
          tl.from("#brow" + i, { x: -40, opacity: 0, duration: 0.45, ease: "expo.out" }, s + 0.25 + i * 0.12);
          tl.fromTo("#bfill" + i, { scaleX: 0 }, { scaleX: 1, duration: 0.65, ease: "power3.out" }, s + 0.4 + i * 0.12);
          // vệt sáng quét qua thanh sau khi đầy → motion-graphics, không tĩnh
          tl.fromTo("#bsheen" + i, { x: -160 }, { x: 1240, duration: 0.75, ease: "power2.in" }, s + 0.95 + i * 0.12);
        });
      }

      /* S4 pills */
      if (has("s6")) {
        const s = startOf.s6;
        if (document.getElementById("s6eb")) tl.from("#s6eb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        tl.from("#s6pills .pill", { y: 30, opacity: 0, duration: 0.45, stagger: 0.1, ease: "back.out(1.5)" }, s + 0.3);
        // mid-scene: icon trong từng pill "nảy" lần lượt thành sóng → sống động
        for (let i = 0; i < 4; i++)
          if (document.getElementById("pill" + i))
            tl.to("#pill" + i + " .pic", { scale: 1.16, duration: 0.32, yoyo: true, repeat: 1, ease: "sine.inOut" }, s + 0.95 + i * 0.42);
      }

      /* S_emph */
      if (has("s_emph")) {
        const s = startOf.s_emph;
        if (document.getElementById("emphCallout")) tl.from("#emphCallout", { x: -40, opacity: 0, duration: 0.45, ease: "expo.out" }, s + 0.15);
        if (document.getElementById("emphCard")) {
          tl.fromTo("#emphCard", { y: 36, opacity: 0, scale: 0.96 }, { y: 0, opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, s + 0.4);
          // mid-scene: thẻ gradient "thở" nhẹ
          tl.to("#emphCard", { scale: 1.018, duration: Math.max(1, win / 2), yoyo: true, repeat: 1, ease: "sine.inOut" }, s + 1.0);
        }
      }

      /* S_cmp */
      if (has("s_cmp")) {
        const s = startOf.s_cmp;
        if (document.getElementById("cmpEb")) tl.from("#cmpEb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        tl.from("#cmpGrid .ccard", { y: 36, opacity: 0, duration: 0.5, stagger: 0.14, ease: "back.out(1.4)" }, s + 0.3);
        // mid-scene: cột "với AI" (gradient) trôi nổi nhẹ
        tl.to("#cmpGrid .ccard.r", { y: "-=12", duration: Math.max(1, win / 2), yoyo: true, repeat: 1, ease: "sine.inOut" }, s + 1.0);
      }

      /* S5 CTA */
      if (has("s7")) {
        const s = startOf.s7;
        tl.from("#s7e1", { y: 24, opacity: 0, duration: 0.4 }, s + 0.12);
        tl.fromTo("#s7e2", { scale: 0.5, opacity: 0, filter: "blur(8px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.7)" }, s + 0.35);
        tl.to("#s7e2", { scale: 1.04, duration: Math.max(0.8, win / 3), yoyo: true, repeat: 1, ease: "sine.inOut", overwrite: "auto" }, s + 1.0);
        if (document.getElementById("s7e3")) tl.from("#s7e3", { y: 20, opacity: 0, duration: 0.4 }, s + 0.7);
      }

      tl.to({}, { duration: 0.001 }, Math.max(0, total - 0.001));
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
