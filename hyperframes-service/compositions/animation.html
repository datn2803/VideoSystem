<!doctype html>
<html
  lang="vi"
  data-composition-variables='[
    {"id":"hook_line1","type":"text","label":"Hook dòng 1","default":"Hầu hết người"},
    {"id":"hook_line2","type":"text","label":"Hook dòng 2","default":"làm content"},
    {"id":"hook_keyword","type":"text","label":"Hook từ khoá (đỏ)","default":"Đang vô hình"},
    {"id":"hook_sub","type":"text","label":"Hook phụ đề","default":"— và đây là lý do"},
    {"id":"data_title","type":"text","label":"Data: tiêu đề nhỏ","default":"Sự khác biệt nằm ở số giờ rèn luyện mỗi tháng"},
    {"id":"data_a_label","type":"text","label":"Data A: nhãn (thắng)","default":"bứt phá"},
    {"id":"data_a_value","type":"text","label":"Data A: số","default":"65"},
    {"id":"data_a_unit","type":"text","label":"Data A: đơn vị","default":"giờ học / tháng"},
    {"id":"data_b_label","type":"text","label":"Data B: nhãn (thua)","default":"dậm chân"},
    {"id":"data_b_value","type":"text","label":"Data B: số","default":"20"},
    {"id":"data_b_unit","type":"text","label":"Data B: đơn vị","default":"giờ học / tháng"},
    {"id":"data_ghost","type":"text","label":"Data: chữ nền mờ","default":"vô hình"},
    {"id":"levels_title","type":"text","label":"Levels: tiêu đề","default":"4 cấp độ của một creator"},
    {"id":"levels","type":"text","label":"Levels (JSON mảng [{n,label,desc,locked}])","default":"[{\"n\":\"1\",\"label\":\"Vô hình\",\"desc\":\"Chưa ai biết bạn là ai\",\"locked\":false,\"active\":true},{\"n\":\"2\",\"label\":\"Có người xem\",\"desc\":\"Bắt đầu có khán giả\",\"locked\":false},{\"n\":\"3\",\"label\":\"Có thu nhập\",\"desc\":\"Kiếm tiền từ nội dung\",\"locked\":true},{\"n\":\"4\",\"label\":\"Tự động hoá\",\"desc\":\"Hệ thống tự vận hành\",\"locked\":true}]"},
    {"id":"cta_top","type":"text","label":"CTA dòng trên","default":"Bạn đang ở"},
    {"id":"cta_keyword","type":"text","label":"CTA từ khoá (đỏ)","default":"Level mấy?"},
    {"id":"cta_sub","type":"text","label":"CTA phụ đề","default":"Trả lời ngay bên dưới nhé"},
    {"id":"cta_hl","type":"text","label":"CTA tu khoa nhan (vd LAI)","default":""},
    {"id":"accent_color","type":"color","label":"Màu nhấn","default":"#e11d2a"},
    {"id":"voice_url","type":"text","label":"Voice-over URL (mp3/wav, public)","default":""},
    {"id":"duration","type":"text","label":"Tổng thời lượng (giây) — khớp voice-over","default":"18.5"},
    {"id":"theme","type":"text","label":"Theme index (0-4) — đổi màu/nền theo content","default":"0"},
    {"id":"hook_stat","type":"text","label":"Hook stat chip value|unit (so that, rong=an)","default":""},
    {"id":"data_style","type":"text","label":"Data viz: 0=2 cột so sánh, 1=biểu đồ cột","default":"0"},
    {"id":"data_bars","type":"text","label":"Bar chart data (JSON [{label,value,unit}])","default":"[]"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../assets/fonts/be-vietnam-pro.css" />
    <script src="../vendor/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0a0a0c;
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      :root {
        --red: #e11d2a;
        --red-soft: #ff3b46;
        --ink: #14110f;
        --paper: #e9e3d6;
      }

      #root { position: relative; width: 1080px; height: 1920px; }

      /* ---- Scene base ---- */
      .scene {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      /* Cinematic dark background — màu lấy từ THEME (đổi theo content) qua CSS vars. */
      .bg-dark {
        background:
          radial-gradient(120% 90% at 80% 110%, var(--corner-glow, rgba(160, 20, 35, 0.42)) 0%, rgba(120,15,30,0.0) 45%),
          radial-gradient(120% 80% at 12% -10%, rgba(70,70,80,0.20) 0%, rgba(0,0,0,0) 50%),
          linear-gradient(160deg, var(--bg1, #16161a) 0%, var(--bg2, #0c0c0f) 55%, #050506 100%);
      }
      .dotgrid {
        position: absolute; inset: 0; pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.05) 1.4px, transparent 1.4px);
        background-size: 46px 46px;
        mask-image: radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 80%);
        -webkit-mask-image: radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 80%);
      }
      .vignette {
        position: absolute; inset: 0; pointer-events: none;
        box-shadow: inset 0 0 320px 80px rgba(0,0,0,0.85);
      }

      /* ===================== SCENE 1 — kinetic caption ===================== */
      #s1 { padding: 0 90px; }
      #s1 .cap { text-align: center; line-height: 1.02; }
      #s1 .l {
        display: block;
        color: #fff;
        font-weight: 900;
        letter-spacing: -0.5px;
        text-transform: uppercase;
      }
      #s1 .l1 { font-size: 96px; }
      #s1 .l2 { font-size: 96px; }
      #s1 .key {
        display: block;
        color: var(--red);
        font-weight: 900;
        font-size: 150px;
        text-transform: uppercase;
        letter-spacing: -1px;
        margin: 18px 0 26px;
        text-shadow: 0 0 60px var(--red-glow, rgba(225,29,42,0.55));
      }
      #s1 .sub {
        display: block;
        color: rgba(255,255,255,0.78);
        font-weight: 600;
        font-size: 46px;
        letter-spacing: 0.3px;
      }
      .word { display: inline-block; will-change: transform, opacity; }

      /* ---- Hook motif (động) — vòng sáng + viền + hạt trôi + chip số liệu ----
         Căn giữa bằng inset+margin (KHÔNG transform) để GSAP tự do xoay/scale. */
      #s1 .motif {
        position: absolute; inset: 0; margin: auto; width: 820px; height: 820px;
        border-radius: 50%; pointer-events: none; opacity: 0.18; filter: blur(6px);
        background: radial-gradient(circle, var(--red) 0%, rgba(0,0,0,0) 60%);
      }
      #s1 .ring {
        position: absolute; inset: 0; margin: auto; width: 680px; height: 680px;
        border-radius: 50%; border: 3px dashed rgba(255,255,255,0.12);
        pointer-events: none; will-change: transform;
      }
      #s1 .fdot { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--red); opacity: 0.5; will-change: transform; }
      #s1 .chip {
        position: absolute; left: 0; right: 0; margin: 0 auto; width: max-content;
        top: 250px; display: flex; align-items: center; gap: 14px;
        padding: 16px 34px; border-radius: 999px;
        background: rgba(255,255,255,0.06); border: 1.6px solid var(--red);
        box-shadow: 0 0 56px var(--red-glow, rgba(225,29,42,0.4));
        will-change: transform, opacity;
      }
      #s1 .chip .cv { color: var(--red); font-weight: 900; font-size: 66px; line-height: 1; }
      #s1 .chip .ct { color: rgba(255,255,255,0.92); font-weight: 600; font-size: 34px; }
      #s1 .cap { position: relative; z-index: 2; }

      /* ===================== SCENE 2 — data viz (paper) ===================== */
      #s2 { background: var(--paper); }
      #s2 .paper-tex {
        position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
        background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
        background-size: 7px 7px;
      }
      #s2 .ghost {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 760px; color: rgba(20,17,15,0.05);
        letter-spacing: -20px; user-select: none; pointer-events: none;
      }
      #s2 .eyebrow {
        position: relative; color: rgba(20,17,15,0.55);
        font-weight: 600; font-size: 40px; margin-bottom: 90px; text-align: center;
        padding: 0 80px;
      }
      #s2 .cols { position: relative; display: flex; gap: 60px; width: 100%; justify-content: center; }
      #s2 .col { width: 420px; text-align: center; }
      #s2 .col.lose { opacity: 0.42; }
      #s2 .icon { height: 230px; margin-bottom: 28px; }
      #s2 .icon svg { height: 100%; width: auto; }
      #s2 .clabel {
        color: var(--ink); font-weight: 900; font-size: 64px; text-transform: lowercase;
        letter-spacing: -0.5px;
      }
      #s2 .num {
        color: var(--ink); font-weight: 900; font-size: 132px; line-height: 1; margin-top: 10px;
      }
      #s2 .col.win .num { color: var(--red); }
      #s2 .unit { color: rgba(20,17,15,0.6); font-weight: 600; font-size: 38px; margin-top: 6px; }

      /* ---- Data viz biến thể: BIỂU ĐỒ CỘT animate (trên nền tối theme) ---- */
      #s2 .bars { position: relative; width: 100%; max-width: 880px; padding: 0 70px;
        display: flex; flex-direction: column; gap: 42px; }
      #s2 .bars .brow { display: flex; flex-direction: column; gap: 12px; will-change: transform, opacity; }
      /* Nhãn 1 DÒNG RIÊNG (wrap ngang bình thường — không rớt dọc từng chữ). */
      #s2 .bars .bname { color: #fff; font-weight: 700; font-size: 36px; line-height: 1.2; letter-spacing: -0.3px; }
      #s2 .bars .bbar { display: flex; align-items: center; gap: 22px; }
      #s2 .bars .btrack { flex: 1; min-width: 0; height: 40px; border-radius: 20px; background: rgba(255,255,255,0.09); overflow: hidden; }
      #s2 .bars .bfill { height: 100%; border-radius: 20px;
        background: linear-gradient(90deg, var(--red-soft), var(--red));
        transform-origin: left center; transform: scaleX(0); will-change: transform;
        box-shadow: 0 0 40px var(--red-glow, rgba(225,29,42,0.4)); }
      /* Value NGẮN (chỉ số + đơn vị ngắn) bên phải bar, không xuống dòng. */
      #s2 .bars .bval { color: var(--red); font-weight: 900; font-size: 50px; line-height: 1; white-space: nowrap; flex: 0 0 auto; }

      /* ===================== SCENE 3 — level cards ===================== */
      #s3 { padding: 0 80px; justify-content: flex-start; }
      #s3 .title {
        color: #fff; font-weight: 900; font-size: 64px; text-transform: uppercase;
        text-align: center; letter-spacing: -0.5px; margin-top: 230px; margin-bottom: 70px;
        line-height: 1.05;
      }
      #s3 .cards { width: 100%; display: flex; flex-direction: column; gap: 30px; }
      .card {
        display: flex; align-items: center; gap: 34px;
        background: linear-gradient(180deg, rgba(40,40,46,0.92), rgba(22,22,26,0.92));
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 30px; padding: 34px 40px;
        will-change: transform, opacity;
      }
      .card .badge {
        flex: 0 0 96px; width: 96px; height: 96px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 52px; color: #fff;
        background: radial-gradient(circle at 35% 30%, #3a3a42, #1b1b20);
        border: 1px solid rgba(255,255,255,0.12);
      }
      .card .meta { text-align: left; }
      .card .lv { color: rgba(255,255,255,0.55); font-weight: 800; font-size: 30px; letter-spacing: 4px; text-transform: uppercase; }
      .card .name { color: #fff; font-weight: 800; font-size: 40px; text-transform: none; letter-spacing: -0.3px; line-height: 1.18; margin-top: 2px; }
      .card .desc { color: rgba(255,255,255,0.62); font-weight: 500; font-size: 34px; margin-top: 8px; }
      .card .lock { margin-left: auto; display: flex; align-items: center; opacity: 0.55; }
      .card .lock svg { width: 46px; height: 46px; }
      .card.locked { opacity: 0.5; }
      .card.active {
        background: linear-gradient(180deg, rgba(60,22,26,0.96), rgba(34,14,16,0.96));
        border: 1.5px solid var(--red);
        box-shadow: 0 0 70px rgba(225,29,42,0.35);
      }
      .card.active .badge { background: radial-gradient(circle at 35% 30%, #ff4350, #c2101c); border-color: rgba(255,255,255,0.3); }
      .card.active .lv { color: var(--red-soft); }

      /* ===================== SCENE 4 — closing caption ===================== */
      #s4 .end { text-align: center; max-width: 900px; }
      #s4 .e1 { color: #fff; font-weight: 800; font-size: 84px; line-height: 1.14; text-transform: uppercase; letter-spacing: -0.5px; }
      #s4 .e2 {
        color: var(--red); font-weight: 900; font-size: 150px; line-height: 1.12; text-transform: uppercase;
        letter-spacing: -1px; margin-top: 20px; text-shadow: 0 0 70px var(--red-glow, rgba(225,29,42,0.55));
        will-change: transform;
      }
      /* Từ khoá CTA nhấn (vd 'LAI') → trắng + glow để bật khỏi nền chữ accent. */
      #s4 .e2 .e2hl { color: #fff; text-shadow: 0 0 46px var(--red-glow, rgba(225,29,42,0.75)); }
      #s4 .e3 { color: rgba(255,255,255,0.78); font-weight: 600; font-size: 44px; line-height: 1.2; margin-top: 46px; display: flex; align-items: center; justify-content: center; gap: 14px; }
      #s4 .e3 .emo { font-size: 56px; line-height: 1; }
      #s4 .e3 svg { width: 40px; height: 40px; }
    </style>
  </head>

  <body>
    <div
      id="root"
      class="composition"
      data-composition-id="main"
      data-start="0"
      data-duration="18.5"
      data-width="1080"
      data-height="1920"
    >
      <!-- Voice-over: MUST be STATIC with a STATIC src — the renderer's audio mux
           pass scans compile-time HTML, so the render service bakes voice_url into
           src= (and data-duration) here. data-track-index 9 keeps it off the visual
           tracks (0 = bgbase, 1 = scenes). -->
      <audio id="vo" class="clip" data-start="0" data-duration="18.5" data-track-index="9" data-volume="1" src=""></audio>

      <!-- Persistent cinematic background (track 0) so any hidden-scene gap shows
           a branded dark backdrop instead of pure black. -->
      <div id="bgbase" class="scene bg-dark clip" data-start="0" data-duration="18.5" data-track-index="0">
        <div class="dotgrid"></div>
        <div class="vignette"></div>
      </div>

      <!-- ===================== SCENE 1 ===================== -->
      <div id="s1" class="scene bg-dark clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="vignette"></div>
        <!-- Hook motif động (đằng sau chữ): vòng sáng + viền xoay + hạt trôi + chip số liệu. -->
        <div class="motif"></div>
        <div class="ring" id="s1ring"></div>
        <div class="fdot" id="fd0" style="top:17%; left:13%"></div>
        <div class="fdot" id="fd1" style="top:23%; right:15%"></div>
        <div class="fdot" id="fd2" style="bottom:24%; left:18%"></div>
        <div class="fdot" id="fd3" style="bottom:19%; right:17%"></div>
        <div class="chip" id="s1chip"><span class="cv" id="s1chipv"></span><span class="ct" id="s1chipt"></span></div>
        <div class="cap">
          <span class="l l1" id="s1l1"></span>
          <span class="l l2" id="s1l2"></span>
          <span class="key" id="s1key"></span>
          <span class="sub" id="s1sub"></span>
        </div>
      </div>

      <!-- ===================== SCENE 2 ===================== -->
      <div id="s2" class="scene clip" data-start="5" data-duration="5.5" data-track-index="1">
        <div class="paper-tex"></div>
        <div class="ghost" id="s2ghost" data-layout-allow-overflow></div>
        <div class="eyebrow" id="s2eb"></div>
        <div class="cols">
          <div class="col win">
            <div class="icon">
              <svg viewBox="0 0 120 120" fill="none" stroke="#14110f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="46" cy="30" r="16"/>
                <path d="M22 70c0-13 11-22 24-22s24 9 24 22"/>
                <rect x="40" y="74" width="64" height="36" rx="4"/>
                <line x1="34" y1="110" x2="110" y2="110"/>
                <circle cx="72" cy="92" r="6"/>
                <path d="M86 34l16-16m0 0h-12m12 0v12"/>
              </svg>
            </div>
            <div class="clabel" id="s2aLabel"></div>
            <div class="num"><span id="numWin">0</span></div>
            <div class="unit" id="s2aUnit"></div>
          </div>
          <div class="col lose">
            <div class="icon">
              <svg viewBox="0 0 120 120" fill="none" stroke="#14110f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="60" cy="34" r="16"/>
                <path d="M36 78c0-13 11-24 24-24s24 11 24 24"/>
                <rect x="30" y="80" width="60" height="30" rx="4"/>
                <line x1="24" y1="110" x2="96" y2="110"/>
                <circle cx="60" cy="95" r="5"/>
              </svg>
            </div>
            <div class="clabel" id="s2bLabel"></div>
            <div class="num"><span id="numLose">0</span></div>
            <div class="unit" id="s2bUnit"></div>
          </div>
        </div>
        <!-- Biến thể data viz: biểu đồ cột (dựng động bằng JS khi data_style=1). -->
        <div id="s2bars" class="bars"></div>
      </div>

      <!-- ===================== SCENE 3 ===================== -->
      <div id="s3" class="scene bg-dark clip" data-start="10.5" data-duration="4.5" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="vignette"></div>
        <div class="title" id="s3title"></div>
        <div class="cards" id="s3cards"></div>
      </div>

      <!-- ===================== SCENE 4 ===================== -->
      <div id="s4" class="scene bg-dark clip" data-start="15" data-duration="3.5" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="vignette"></div>
        <div class="end">
          <div class="e1" id="s4e1"></div>
          <div class="e2" id="s4e2"></div>
          <div class="e3" id="s4e3"><span id="s4e3text"></span><svg viewBox="0 0 24 24" fill="none" stroke="#e11d2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m6 13 6 6 6-6"/></svg></div>
        </div>
      </div>
    </div>

    <script>
      // ── Read variables (sync, before building DOM + timeline) ──
      const v = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables()
        : {};

      // Helper: set textContent (Vietnamese-safe, injection-safe — never innerHTML).
      const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val == null ? "" : String(val); };
      // Helper: split a phrase into word spans (for kinetic stagger), using textContent.
      const fillWords = (id, phrase) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = "";
        const words = String(phrase || "").trim().split(/\s+/).filter(Boolean);
        words.forEach((w, i) => {
          if (i > 0) el.appendChild(document.createTextNode(" "));
          const span = document.createElement("span");
          span.className = "word";
          span.textContent = w;
          el.appendChild(span);
        });
      };

      // ── THEME (đổi theo content) — mỗi video 1 bộ màu/nền → hết "y 1 concept". ──
      const THEMES = [
        { red: "#e11d2a", soft: "#ff3b46", glow: "rgba(225,29,42,0.5)",  bg1: "#16161a", bg2: "#0c0c0f", corner: "rgba(160,20,35,0.42)" }, // crimson
        { red: "#3b82f6", soft: "#60a5fa", glow: "rgba(59,130,246,0.5)", bg1: "#0e1626", bg2: "#070d18", corner: "rgba(40,90,200,0.40)" },  // indigo
        { red: "#10b981", soft: "#34d399", glow: "rgba(16,185,129,0.48)",bg1: "#0c1a16", bg2: "#06100d", corner: "rgba(16,150,110,0.38)" }, // emerald
        { red: "#f59e0b", soft: "#fbbf24", glow: "rgba(245,158,11,0.5)", bg1: "#1c1608", bg2: "#0f0b04", corner: "rgba(200,140,20,0.42)" }, // amber
        { red: "#a855f7", soft: "#c084fc", glow: "rgba(168,85,247,0.5)", bg1: "#160e22", bg2: "#0c0715", corner: "rgba(130,60,200,0.40)" }, // violet
      ];
      const ti = Math.max(0, Math.min(THEMES.length - 1, parseInt(v.theme, 10) || 0));
      const TH = THEMES[ti];
      const rootStyle = document.documentElement.style;
      // accent_color chỉ thắng khi theme mặc định (0); còn lại theme quyết định màu.
      rootStyle.setProperty("--red", (v.accent_color && ti === 0) ? v.accent_color : TH.red);
      rootStyle.setProperty("--red-soft", TH.soft);
      rootStyle.setProperty("--red-glow", TH.glow);
      rootStyle.setProperty("--bg1", TH.bg1);
      rootStyle.setProperty("--bg2", TH.bg2);
      rootStyle.setProperty("--corner-glow", TH.corner);

      // ── Hook stat chip: số liệu THẬT ngắn ("value|unit") → minh hoạ data ở hook. Rỗng → ẩn. ──
      const chipEl = document.getElementById("s1chip");
      const hs = String(v.hook_stat || "").trim();
      if (hs && chipEl) {
        const parts = hs.split("|");
        setText("s1chipv", (parts[0] || "").trim());
        const t = (parts[1] || "").trim();
        if (t) setText("s1chipt", t);
        else { const ct = document.getElementById("s1chipt"); if (ct) ct.remove(); }
      } else if (chipEl) {
        chipEl.remove();
      }

      // ── Duration scaling: stretch the 4-scene timeline to fit the voice-over ──
      // Voice-over (C3) is often longer than the base 18.5s. Scale every scene
      // window + GSAP position by k so the 4 scenes spread evenly across the full
      // duration (no cut-off, no leftover static background). Visual clip windows
      // are read from the live DOM at runtime; the server bakes the compile-time
      // bits (root data-duration, audio src/data-duration).
      const BASE = 18.5;
      const dur = parseFloat(v.duration) || BASE;
      const k = dur / BASE;
      const P = (t) => +(t * k).toFixed(3); // scaled timeline position
      ["bgbase", "s1", "s2", "s3", "s4"].forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        const st = parseFloat(el.getAttribute("data-start")) || 0;
        const du = parseFloat(el.getAttribute("data-duration")) || 0;
        el.setAttribute("data-start", String(+(st * k).toFixed(3)));
        el.setAttribute("data-duration", String(+(du * k).toFixed(3)));
      });

      // ── SCENE 1 ──
      fillWords("s1l1", v.hook_line1);
      fillWords("s1l2", v.hook_line2);
      setText("s1key", v.hook_keyword);
      setText("s1sub", v.hook_sub);

      // ── SCENE 2 ──
      setText("s2ghost", v.data_ghost);
      setText("s2eb", v.data_title);
      setText("s2aLabel", v.data_a_label);
      setText("s2aUnit", v.data_a_unit);
      setText("s2bLabel", v.data_b_label);
      setText("s2bUnit", v.data_b_unit);
      // Numeric targets for count-up (fall back to text if non-numeric)
      const aNum = Number(String(v.data_a_value ?? "").replace(/[^\d.-]/g, ""));
      const bNum = Number(String(v.data_b_value ?? "").replace(/[^\d.-]/g, ""));
      const aTarget = Number.isFinite(aNum) ? aNum : 0;
      const bTarget = Number.isFinite(bNum) ? bNum : 0;
      const aIsNum = Number.isFinite(aNum) && String(v.data_a_value ?? "").trim() !== "";
      const bIsNum = Number.isFinite(bNum) && String(v.data_b_value ?? "").trim() !== "";
      if (!aIsNum) setText("numWin", v.data_a_value);
      if (!bIsNum) setText("numLose", v.data_b_value);

      // Hide the whole data-viz scene if there's no real data — never show the
      // template's placeholder numbers (anti-fabrication). The persistent #bgbase
      // covers the time gap so it reads as an intentional dark backdrop.
      const hasDataScene = String(v.data_a_value ?? "").trim() !== "" || String(v.data_b_value ?? "").trim() !== "";
      if (!hasDataScene) { const s2el = document.getElementById("s2"); if (s2el) s2el.remove(); }

      // ── SCENE 2 biến thể: BIỂU ĐỒ CỘT (data_style=1, ≥2 số thật) — đa dạng cấu trúc
      //    + "số liệu motion" (cột mọc lên). Nền chuyển trong suốt → #bgbase tối theo theme. ──
      let bars = [];
      try { bars = JSON.parse(v.data_bars || "[]"); } catch (e) { bars = []; }
      const useBars = String(v.data_style || "0") === "1" && Array.isArray(bars) && bars.length >= 2;
      if (hasDataScene && useBars) {
        const s2node = document.getElementById("s2");
        if (s2node) {
          s2node.style.background = "transparent";
          ["paper-tex", "ghost", "cols"].forEach((c) => { const el = s2node.querySelector("." + c); if (el) el.remove(); });
          const ebEl = document.getElementById("s2eb"); if (ebEl) ebEl.style.color = "rgba(255,255,255,0.7)";
          const host = document.getElementById("s2bars");
          const nums = bars.map((b) => { const x = Number(String(b.value).replace(/[^\d.-]/g, "")); return Number.isFinite(x) ? x : 0; });
          const maxv = Math.max.apply(null, nums.concat([1]));
          bars.slice(0, 4).forEach((b, i) => {
            const row = document.createElement("div"); row.className = "brow"; row.id = "brow" + i;
            const nm = document.createElement("div"); nm.className = "bname"; nm.textContent = String(b.label || "");
            const bbar = document.createElement("div"); bbar.className = "bbar";
            const track = document.createElement("div"); track.className = "btrack";
            const fill = document.createElement("div"); fill.className = "bfill"; fill.id = "bfill" + i;
            fill.style.width = Math.max(6, Math.round((nums[i] / maxv) * 100)) + "%";
            track.appendChild(fill);
            const vl = document.createElement("span"); vl.className = "bval";
            vl.textContent = String(b.value || "") + (b.unit ? " " + String(b.unit) : "");
            bbar.appendChild(track); bbar.appendChild(vl);
            row.appendChild(nm); row.appendChild(bbar);
            if (host) host.appendChild(row);
          });
        }
      } else {
        const sb = document.getElementById("s2bars"); if (sb) sb.remove();
      }

      // ── SCENE 3 (level cards from JSON) ──
      let levels = [];
      try { levels = JSON.parse(v.levels || "[]"); } catch (e) { levels = []; }
      const s3 = document.getElementById("s3");
      const cardsHost = document.getElementById("s3cards");
      setText("s3title", v.levels_title);
      if (!Array.isArray(levels) || levels.length === 0) {
        // No levels → drop scene 3 entirely and pull later scenes earlier handled by timeline guards.
        if (s3) s3.remove();
      } else {
        const lockSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';
        levels.forEach((lv) => {
          const card = document.createElement("div");
          card.className = "card" + (lv.active ? " active" : "") + (lv.locked ? " locked" : "");
          const badge = document.createElement("div");
          badge.className = "badge";
          badge.textContent = lv.n == null ? "" : String(lv.n);
          const meta = document.createElement("div");
          meta.className = "meta";
          // Kicker ("Level N" / nhãn) CHỈ hiện khi item có `kicker` → point cards
          // tổng quát (badge số + câu chốt) cho keyMessages, không ép chữ "Level".
          if (lv.kicker) {
            const lvl = document.createElement("div");
            lvl.className = "lv";
            lvl.textContent = String(lv.kicker);
            meta.appendChild(lvl);
          }
          const name = document.createElement("div");
          name.className = "name";
          name.textContent = lv.label == null ? "" : String(lv.label);
          meta.appendChild(name);
          if (lv.desc) {
            const desc = document.createElement("div");
            desc.className = "desc";
            desc.textContent = String(lv.desc);
            meta.appendChild(desc);
          }
          card.appendChild(badge); card.appendChild(meta);
          if (lv.locked) {
            const lock = document.createElement("div");
            lock.className = "lock";
            lock.innerHTML = lockSvg; // static, trusted markup (no user data)
            card.appendChild(lock);
          }
          cardsHost.appendChild(card);
        });
      }

      // ── SCENE 4 (CTA) ──
      setText("s4e1", v.cta_top);
      // e2: action + NHẤN từ khoá (cta_hl) bằng span trắng-glow (textContent an toàn).
      (function () {
        const e2 = document.getElementById("s4e2");
        if (!e2) return;
        e2.textContent = "";
        const text = String(v.cta_keyword || "");
        const hl = String(v.cta_hl || "").trim();
        const idx = hl ? text.toLowerCase().indexOf(hl.toLowerCase()) : -1;
        if (hl && idx >= 0) {
          if (idx > 0) e2.appendChild(document.createTextNode(text.slice(0, idx)));
          const sp = document.createElement("span"); sp.className = "e2hl";
          sp.textContent = text.slice(idx, idx + hl.length);
          e2.appendChild(sp);
          const after = text.slice(idx + hl.length);
          if (after) e2.appendChild(document.createTextNode(after));
        } else {
          e2.textContent = text;
        }
      })();
      // e3: emoji 👇 + phụ đề — luôn hiện emoji CTA cho có flair (mũi tên SVG giữ nguyên).
      (function () {
        const e3 = document.getElementById("s4e3");
        if (!e3) return;
        const emo = document.createElement("span"); emo.className = "emo"; emo.textContent = "👇";
        e3.insertBefore(emo, e3.firstChild);
        setText("s4e3text", v.cta_sub || "");
      })();

      // ── AUTO-FIT: co chữ lớn cho VỪA khung (chống tràn/mất chữ khi câu dài —
      //    lỗi gây hỏng khi cắt ghép). Binary-search font-size tới khi vừa cả
      //    chiều rộng lẫn chiều cao container (theo css-tricks / fitty / auto-text-size). ──
      function fitText(id, maxPx, minPx, maxH) {
        const el = document.getElementById(id);
        if (!el || !String(el.textContent || "").trim()) return;
        el.style.lineHeight = el.style.lineHeight || "1.16";
        let lo = minPx, hi = maxPx, best = minPx;
        for (let i = 0; i < 12; i++) {
          const mid = (lo + hi) / 2;
          el.style.fontSize = mid + "px";
          const fitsW = el.scrollWidth <= el.clientWidth + 1;
          const fitsH = el.scrollHeight <= maxH;
          if (fitsW && fitsH) { best = mid; lo = mid; } else { hi = mid; }
        }
        el.style.fontSize = Math.floor(best) + "px";
      }
      // S1 hook + S4 CTA — các chữ lớn dễ tràn nhất.
      fitText("s1l1", 96, 44, 230);
      fitText("s1l2", 96, 44, 230);
      fitText("s1key", 150, 48, 380);
      fitText("s1sub", 46, 26, 130);
      fitText("s4e1", 84, 38, 210);
      fitText("s4e2", 130, 44, 560);
      fitText("s4e3text", 44, 24, 120);

      // ── GSAP timeline (built AFTER DOM is populated so selectors resolve) ──
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      gsap.defaults({ ease: "power3.out" });

      // Positions scaled by k via P() so the 4 scenes spread across the full
      // (voice-over) duration; tween durations stay fixed so pops stay snappy.
      /* SCENE 1 (0 → 5s base) */
      // Motif động (sau chữ): vòng sáng pulse + viền xoay chậm + hạt trôi + chip số liệu pop.
      tl.fromTo("#s1 .motif", { scale: 0.78, opacity: 0 }, { scale: 1, opacity: 0.18, duration: 0.9, ease: "power2.out" }, P(0.05));
      tl.to("#s1 .motif", { scale: 1.08, duration: P(4), ease: "sine.inOut", yoyo: true, repeat: 1 }, P(0.9));
      if (document.getElementById("s1ring")) {
        tl.fromTo("#s1ring", { rotation: -10, scale: 0.9, opacity: 0 }, { rotation: 10, scale: 1, opacity: 1, duration: P(4.8), ease: "none" }, P(0.1));
      }
      ["#fd0", "#fd1", "#fd2", "#fd3"].forEach((s, i) => {
        if (!document.querySelector(s)) return;
        tl.fromTo(s, { opacity: 0, scale: 0 }, { opacity: 0.5, scale: 1, duration: 0.5, ease: "back.out(2)" }, P(0.3 + i * 0.12));
        tl.to(s, { y: i % 2 ? 28 : -28, duration: P(3.8), ease: "sine.inOut", yoyo: true, repeat: 1 }, P(0.7));
      });
      if (document.getElementById("s1chip")) {
        tl.fromTo("#s1chip", { scale: 0.5, opacity: 0, y: -12 }, { scale: 1, opacity: 1, y: 0, duration: 0.55, ease: "back.out(1.8)" }, P(0.35));
      }
      tl.from("#s1 .l1 .word", { yPercent: 120, opacity: 0, duration: 0.5, stagger: 0.08 }, P(0.15));
      tl.from("#s1 .l2 .word", { yPercent: 120, opacity: 0, duration: 0.5, stagger: 0.08 }, P(0.55));
      tl.fromTo("#s1key",
        { scale: 0.4, opacity: 0, filter: "blur(8px)" },
        { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.8)" }, P(1.5));
      tl.fromTo("#s1sub", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, P(2.4));
      // overwrite:"auto" → pulse không chồng tween entrance scale (#s1key) khi seek.
      tl.to("#s1key", { scale: 1.04, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1, overwrite: "auto" }, P(3.0));

      /* SCENE 2 (5 → 10.5s base) */
      tl.from("#s2eb", { y: 24, opacity: 0, duration: 0.5 }, P(5.2));
      tl.from("#s2 .col.win", { y: 50, opacity: 0, duration: 0.6 }, P(5.5));
      tl.from("#s2 .col.lose", { y: 50, opacity: 0, duration: 0.6 }, P(5.8));
      if (aIsNum) {
        const winC = { v: 0 };
        tl.to(winC, { v: aTarget, duration: 1.6, ease: "power1.out",
          onUpdate: () => { const e = document.getElementById("numWin"); if (e) e.textContent = Math.round(winC.v); } }, P(6.1));
      }
      if (bIsNum) {
        const loseC = { v: 0 };
        tl.to(loseC, { v: bTarget, duration: 1.6, ease: "power1.out",
          onUpdate: () => { const e = document.getElementById("numLose"); if (e) e.textContent = Math.round(loseC.v); } }, P(6.1));
      }
      tl.fromTo("#s2 .col.win .num", { scale: 1 }, { scale: 1.12, duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, P(7.9));
      // Biến thể bar chart: hàng trượt vào + cột mọc lên (scaleX) — deterministic, seek-safe.
      if (useBars) {
        bars.slice(0, 4).forEach((_, i) => {
          tl.from("#brow" + i, { x: -50, opacity: 0, duration: 0.5 }, P(5.4 + i * 0.25));
          tl.fromTo("#bfill" + i, { scaleX: 0 }, { scaleX: 1, duration: 0.9, ease: "power3.out" }, P(5.7 + i * 0.25));
        });
      }

      /* SCENE 3 (10.5 - 15s) — guarded: only if scene still present */
      if (document.getElementById("s3")) {
        tl.from("#s3 .title", { y: 30, opacity: 0, duration: 0.5 }, P(10.7));
        tl.from("#s3 .card", { x: -60, opacity: 0, duration: 0.5, stagger: 0.18 }, P(11.0));
        if (document.querySelector("#s3 .card.active")) {
          tl.fromTo("#s3 .card.active",
            { boxShadow: "0 0 0px rgba(225,29,42,0.0)" },
            { boxShadow: "0 0 90px rgba(225,29,42,0.55)", duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut" }, P(12.4));
        }
      }

      /* SCENE 4 (15 → 18.5s base) */
      tl.from("#s4e1", { y: 30, opacity: 0, duration: 0.5 }, P(15.2));
      tl.fromTo("#s4e2",
        { scale: 0.5, opacity: 0, filter: "blur(8px)" },
        { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.8)" }, P(15.5));
      // overwrite:"auto" → pulse không chồng tween entrance scale (#s4e2) khi seek.
      tl.to("#s4e2", { scale: 1.05, duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut", overwrite: "auto" }, P(16.3));
      if (document.getElementById("s4e3")) {
        tl.from("#s4e3", { y: 24, opacity: 0, duration: 0.5 }, P(16.2));
      }

      // Pad timeline to the full (scaled) duration so the render doesn't end early.
      tl.to({}, { duration: 0.001 }, Math.max(0, dur - 0.001));
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
