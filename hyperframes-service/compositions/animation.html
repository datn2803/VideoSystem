        <div class="dotgrid"></div>
        <div class="stack">
          <div class="eyebrow icon" id="baEb"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></span><span class="lbl" id="baLbl"></span></div>
          <div class="bawrap">
            <div class="baside l"><div class="bahd" id="baFromL"></div><div class="bav"><span id="baFrom">0</span><span class="bu" id="baFromU"></span></div><div class="babar"><i id="baFromBar"></i></div></div>
            <svg class="baarrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
            <div class="baside r"><div class="bahd" id="baToL"></div><div class="bav"><span id="baTo">0</span><span class="bu" id="baToU"></span></div><div class="babar"><i id="baToBar"></i></div></div>
          </div>
        </div>
      </div>

      <!-- S_mini: lưới mini-stat 2×2 -->
      <div id="s_mini" class="scene left bg-light clip" data-start="0" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="stack">
          <div class="eyebrow icon" id="miEb"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span><span class="lbl" id="miLbl"></span></div>
          <div class="minigrid" id="miGrid"></div>
        </div>
      </div>

      <!-- S_trend: đường tăng -->
      <div id="s_trend" class="scene left bg-light clip" data-start="0" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="stack">
          <div class="bentohost plain">
            <div class="hosthead"><div class="eyebrow icon" id="trEb"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17 9 11l4 4 8-8"/><path d="M17 4h4v4"/></svg></span><span class="lbl" id="trLbl"></span></div></div>
            <div class="hostbody">
              <div class="trendwrap">
                <svg class="trendsvg" viewBox="0 0 600 300" preserveAspectRatio="none">
                  <defs><linearGradient id="trGrad" x1="0" y1="0" x2="1" y2="0"><stop id="trG0" offset="0"></stop><stop id="trG1" offset="1"></stop></linearGradient></defs>
                  <polyline class="tarea" id="trArea" points=""></polyline>
                  <polyline class="tline" id="trLine" points=""></polyline>
                </svg>
                <div class="tdot" id="trDot"></div>
                <div class="tbadge" id="trBadge"></div>
              </div>
              <div class="blabel" id="trText"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- S5 CTA (center) -->
      <div id="s7" class="scene center bg-light clip" data-start="14.8" data-duration="3.7" data-track-index="1">
        <div class="dotgrid"></div>
        <div class="e1" id="s7e1"></div>
        <div class="e2" id="s7e2"></div>
        <div class="e3" id="s7e3"><span id="s7e3text"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><path d="M12 5v14"/><path d="m6 13 6 6 6-6"/></svg></div>
      </div>

      <!-- Header trên (brand/topic) — đóng khung đỉnh -->
      <div id="topbar">
        <span class="tmark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.5L19.5 10l-5.6 1.5L12 17l-1.9-5.5L4.5 10l5.6-1.5z"/></svg></span>
        <span class="ttxt" id="topbarTxt"></span>
        <span class="tline"></span>
      </div>

      <!-- Thanh tiến trình chạy suốt clip (lấp đáy) -->
      <div id="capbox"></div>
      <div id="progress"><div class="pfb" id="progressFill"></div></div>
    </div>

    <script>
      const v = (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {};
      const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val == null ? "" : String(val); };
      const fillWords = (id, phrase) => {
        const el = document.getElementById(id); if (!el) return;
        el.textContent = "";
        String(phrase || "").trim().split(/\s+/).filter(Boolean).forEach((w, i) => {
          if (i > 0) el.appendChild(document.createTextNode(" "));
          const sp = document.createElement("span"); sp.className = "word"; sp.style.display = "inline-block"; sp.textContent = w; el.appendChild(sp);
        });
      };
      const parseJSON = (s, fb) => { try { const p = JSON.parse(s); return p == null ? fb : p; } catch (e) { return fb; } };
      const remove = (id) => { const el = document.getElementById(id); if (el) el.remove(); };
      const hideIfEmpty = (id, val) => { if (!String(val || "").trim()) remove(id); else setText(id, val); };

      // ── Bộ icon line (đúng vibe donnie): chọn theo TỪ KHOÁ trong nhãn, fallback theo index ──
      const ICONS = {
        clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
        refresh: '<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/>',
        chart: '<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7"/><rect x="13" y="6" width="3" height="12"/>',
        target: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4"/>',
        check: '<circle cx="12" cy="12" r="9"/><path d="m8.4 12 2.5 2.5 4.7-5"/>',
        shield: '<path d="M12 3 5 6v5c0 4 3 7 7 8 4-1 7-4 7-8V6l-7-3z"/>',
        layers: '<path d="m12 3 9 5-9 5-9-5 9-5z"/><path d="m3 13 9 5 9-5"/>',
        puzzle: '<path d="M10 4a2 2 0 1 1 4 0h3a1 1 0 0 1 1 1v3a2 2 0 1 1 0 4v3a1 1 0 0 1-1 1h-3a2 2 0 1 0-4 0H7a1 1 0 0 1-1-1v-3a2 2 0 1 1 0-4V5a1 1 0 0 1 1-1h3z"/>',
        rocket: '<path d="M5 15c-1 1-1 4-1 4s3 0 4-1m10-14c-3 0-7 2-9 6l-1 3 3-1c4-2 6-6 6-9z"/><circle cx="14" cy="9" r="1.3"/>',
        database: '<ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v12c0 1.7 3.6 3 8 3s8-1.3 8-3V6"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/>',
        spark: '<path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z"/>',
        bolt: '<path d="M13 2 4 14h7l-1 8 10-12h-7z"/>',
      };
      const ICON_RULES = [
        [/thời gian|nhanh|chậm|tốc độ|giờ|phút/i, "clock"],
        [/lặp|tự động|định kỳ|vòng|quy trình|workflow/i, "refresh"],
        [/đo lường|kết quả|hiệu quả|tăng|giảm|số liệu|dữ liệu|data|doanh/i, "chart"],
        [/pattern|nhận diện|phân tích|insight|mục tiêu|target|tầm nhìn/i, "target"],
        [/chính xác|đúng|chuẩn|kiểm|đánh giá|đảm bảo/i, "check"],
        [/bảo mật|an toàn|rủi ro|bảo vệ/i, "shield"],
        [/xây|hệ thống|kiến trúc|module|cấu trúc|nền tảng/i, "layers"],
        [/tích hợp|kết nối|công cụ|api|tool/i, "puzzle"],
        [/triển khai|ra mắt|bứt phá|tăng trưởng|scale|mở rộng/i, "rocket"],
        [/lưu trữ|bộ nhớ|kho|memory|context|tài liệu/i, "database"],
        [/ý tưởng|sáng tạo|ai|thông minh|tối ưu|gợi ý/i, "spark"],
      ];
      const ICON_CYCLE = ["target", "bolt", "refresh", "chart", "check", "layers", "puzzle", "rocket"];
      function pickIconKey(label, i) {
        const s = String(label || "");
        for (const [re, key] of ICON_RULES) if (re.test(s)) return key;
        return ICON_CYCLE[i % ICON_CYCLE.length];
      }
      function makeIconSVG(key) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("fill", "none");
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "2.2");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.innerHTML = ICONS[key] || ICONS.spark;
        return svg;
      }

      // Kinetic typography: tách câu thành .word (reveal stagger) + tô accent 1 TỪ KHOÁ.
      const STOPW = new Set(["và","của","cho","các","một","là","có","với","để","khi","này","đó","trong","ra","đi","bạn","sẽ","không","mà","như","thì","được","ở","từ","nếu","hơn","rất","cần","khá"]);
      const DOMAINW = /^(ai|automation|bot|agent|prompt|workflow|data|startup|tự|động|viral|tăng|trưởng|tối|ưu|hóa|chiến)$/i;
      function bareWord(w) { return String(w || "").replace(/[^\p{L}\p{N}]/gu, ""); }
      function pickAccentIdx(words) {
        let idx = words.findIndex((w) => DOMAINW.test(bareWord(w)));
        if (idx >= 0) return idx;
        let best = -1, bl = 2;
        words.forEach((w, i) => { const c = bareWord(w); if (c.length > bl && !STOPW.has(c.toLowerCase())) { bl = c.length; best = i; } });
        return best;
      }
      function fillKinetic(el, phrase) {
        if (!el) return;
        el.textContent = "";
        const words = String(phrase || "").trim().split(/\s+/).filter(Boolean);
        const ai = pickAccentIdx(words);
        words.forEach((w, i) => {
          if (i > 0) el.appendChild(document.createTextNode(" "));
          const sp = document.createElement("span");
          sp.className = "word" + (i === ai ? " ac" : "");
          sp.textContent = w;
          el.appendChild(sp);
        });
      }

      // ── THEME: BRIGHT (0-2, mode light) + DARK PRO (3-4, mode dark). Builder chọn index theo industry. ──
      // Token mode-dependent: light/dark dùng default chung, theme có thể override riêng.
      const LIGHT_MODE = {
        cardBorder: "rgba(120,90,210,0.08)", gridDot: "rgba(124,58,237,0.06)",
        elev1: "0 2px 6px rgba(80,62,158,0.05), 0 16px 42px rgba(80,62,158,0.13)",
        elev2: "0 4px 12px rgba(80,62,158,0.10), 0 24px 58px var(--glow)",
        good: "#16a34a", bad: "#dc2626", warn: "#d97706",
      };
      const DARK_MODE = {
        cardBorder: "rgba(255,255,255,0.09)", gridDot: "rgba(255,255,255,0.05)",
        elev1: "0 2px 10px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05)",
        elev2: "0 10px 34px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06), 0 0 46px var(--glow)",
        good: "#34d399", bad: "#f87171", warn: "#fbbf24",
      };
      const THEMES = [
        // BRIGHT (công nghệ/đời sống — tươi, năng lượng)
        { mode: "light", bg1: "#f4f0fc", bg2: "#e9e3f8", accent: "#7c3aed", accent2: "#a78bfa", ink: "#1e1b2e", sub: "#6b6480", card: "#ffffff", glow: "rgba(124,58,237,0.16)" },
        { mode: "light", bg1: "#f8f2e9", bg2: "#f1e7d6", accent: "#7c3aed", accent2: "#f59e0b", ink: "#2b2238", sub: "#6b6480", card: "#fffdfa", glow: "rgba(124,58,237,0.14)" },
        { mode: "light", bg1: "#eef1fb", bg2: "#e3e8f7", accent: "#6d28d9", accent2: "#60a5fa", ink: "#1b1d2e", sub: "#646b80", card: "#ffffff", glow: "rgba(109,40,217,0.15)" },
        // DARK PRO (tài chính — nghiêm túc, chỉn chu, premium)
        { mode: "dark", bg1: "#0f0d17", bg2: "#17121f", accent: "#8b5cf6", accent2: "#22d3ee", ink: "#f4f2fb", sub: "#a39db8", card: "#1c1828", glow: "rgba(139,92,246,0.30)" },
        // DARK TECH (công nghệ nghiêm túc — xanh dương/xanh lá)
        { mode: "dark", bg1: "#0c0f17", bg2: "#121826", accent: "#38bdf8", accent2: "#34d399", ink: "#eef4fb", sub: "#93a0b5", card: "#161c28", glow: "rgba(56,189,248,0.26)" },
      ];
      // ── ÁP TOKEN (Phase 2): BrandKit tokens (Design Director) ƯU TIÊN; rỗng/hỏng → THEMES cũ.
      //    Cùng 1 hàm cho cả 2 nhánh — token đặt tên trùng key THEMES nên áp thẳng. ──
      const setStop = (id, c) => { const e = document.getElementById(id); if (e) e.setAttribute("stop-color", c); };
      const hexA = (hex, a) => {
        const m = /^#([0-9a-f]{6})$/i.exec(String(hex || "").trim());
        if (!m) return "";
        const n = parseInt(m[1], 16);
        return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
      };
      function applyTokens(tk) {
        const mode = tk.mode === "dark" ? "dark" : "light";
        const MO = mode === "dark" ? DARK_MODE : LIGHT_MODE;
        const rs = document.documentElement.style;
        document.documentElement.dataset.mode = mode;
        document.documentElement.dataset.skin = tk.styleVariant || "classic";
        rs.setProperty("--bg1", tk.bg1); rs.setProperty("--bg2", tk.bg2);
        rs.setProperty("--accent", tk.accent); rs.setProperty("--accent2", tk.accent2);
        rs.setProperty("--ink", tk.ink); rs.setProperty("--sub", tk.sub);
        rs.setProperty("--card", tk.card); rs.setProperty("--glow", tk.glow);
        rs.setProperty("--card-border", tk.cardBorder || MO.cardBorder);
        rs.setProperty("--grid-dot", tk.gridDot || MO.gridDot);
        rs.setProperty("--elev-1", tk.elev1 || MO.elev1);
        rs.setProperty("--elev-2", tk.elev2 || MO.elev2);
        rs.setProperty("--good", tk.good || MO.good); rs.setProperty("--bad", tk.bad || MO.bad); rs.setProperty("--warn", tk.warn || MO.warn);
        // Mọi tint accent (--acc-aXX) tính lại theo accent thật → đổi BrandKit là tint đổi theo.
        const A = { a03: 0.03, a06: 0.06, a08: 0.08, a10: 0.10, a12: 0.12, a14: 0.14, a16: 0.16, a18: 0.18, a25: 0.25, a38: 0.38 };
        for (const k in A) { const val = hexA(tk.accent, A[k]); if (val) rs.setProperty("--acc-" + k, val); }
        // gradient stop cho ring donut + đường trend (set trực tiếp → chắc chắn render, không lệ thuộc var() trong SVG)
        setStop("dnG0", tk.accent2); setStop("dnG1", tk.accent);
        setStop("trG0", tk.accent2); setStop("trG1", tk.accent);
      }
      const ti = Math.max(0, Math.min(THEMES.length - 1, parseInt(v.theme, 10) || 0));
      const BK = parseJSON(v.tokens || "", null);
      applyTokens(BK && BK.bg1 && BK.accent ? BK : THEMES[ti]);

      // Header trên (topic) — đóng khung đỉnh. Rỗng → ẩn.
      if (String(v.topic || "").trim()) setText("topbarTxt", String(v.topic).toUpperCase().slice(0, 32));
      else remove("topbar");

      // ── S1 hero ──
      hideIfEmpty("s1eb", v.hook_eyebrow);
      setText("s1key", v.hook_keyword);
      if (!String(v.hook_keyword || "").trim()) remove("s1key");
      fillWords("s1l1", v.hook_line1); fillWords("s1l2", v.hook_line2);
      if (!String(v.hook_line2 || "").trim()) remove("s1l2");
      hideIfEmpty("s1sub", v.hook_sub);
      const heroUrl = String(v.img_hero || "").trim();
      if (heroUrl) { const im = document.getElementById("imgHero"); if (im) im.setAttribute("src", heroUrl); }
      else remove("heroWrap");

      // ── S2 big number (left) — ẩn nếu không có số ──
      const bigRaw = String(v.bignum_value || "").trim();
      const bigNum = Number(bigRaw.replace(/[^\d.-]/g, ""));
      const bigIsNum = bigRaw !== "" && Number.isFinite(bigNum);
      if (bigRaw === "") { remove("s2"); }
      else {
        setText("s2lbl", "Số liệu");               // eyebrow = TAG NGẮN (caption đầy đủ ở dưới số)
        if (!bigIsNum) setText("s2num", bigRaw);
        else setText("s2num", bigNum.toLocaleString("vi-VN")); // FT đo theo GIÁ TRỊ CUỐI (rộng nhất) → không tràn khi đếm
        if (!String(v.bignum_unit || "").trim()) remove("s2unit"); else setText("s2unit", v.bignum_unit);
        hideIfEmpty("s2label", v.bignum_label);
      }

      // ── S3 progress bars (left) — ẩn nếu < 2 ──
      const bars = parseJSON(v.data_bars, []);
      const barsOK = Array.isArray(bars) && bars.length >= 2;
      const barNums = [];
      const barInfo = [];
      if (!barsOK) { remove("s4b"); }
      else {
        hideIfEmpty("s4lbl", v.bars_title); if (!String(v.bars_title || "").trim()) remove("s4eb");
        const host = document.getElementById("s4bars");
        const nums = bars.map((b) => { const x = Number(String(b.value).replace(/[^\d.-]/g, "")); return Number.isFinite(x) ? x : 0; });
        const maxv = Math.max.apply(null, nums.concat([1]));
        bars.slice(0, 4).forEach((b, i) => {
          const row = document.createElement("div"); row.className = "pbar bento" + (nums[i] === maxv ? " win" : ""); row.id = "brow" + i;
          const pl = document.createElement("div"); pl.className = "pl";
          const pn = document.createElement("span"); pn.className = "pn"; pn.textContent = String(b.label || "");
          const pv = document.createElement("span"); pv.className = "pv"; pv.id = "bval" + i;
          const unitTxt = b.unit ? " " + String(b.unit) : "";
          const isNum = /\d/.test(String(b.value || ""));
          pv.textContent = isNum ? "0" + unitTxt : String(b.value || "") + unitTxt; // count-up từ 0 (data motion)
          barInfo.push({ i, num: nums[i], unit: unitTxt, isNum });
          pl.appendChild(pn); pl.appendChild(pv);
          const track = document.createElement("div"); track.className = "ptrack";
          const fill = document.createElement("div"); fill.className = "pfill"; fill.id = "bfill" + i;
          fill.style.width = Math.max(6, Math.round((nums[i] / maxv) * 100)) + "%";
          const sheen = document.createElement("div"); sheen.className = "sheen"; sheen.id = "bsheen" + i;
          fill.appendChild(sheen);
          track.appendChild(fill);
          row.appendChild(pl); row.appendChild(track); host.appendChild(row);
          barNums.push(i);
        });
      }

      // ── S4 pills 2×2 (left) — ưu tiên `pills` (4 distinct), fallback `levels` ──
      const pillsData = parseJSON(v.pills, []);
      const pillSrc = (Array.isArray(pillsData) && pillsData.length) ? pillsData : parseJSON(v.levels, []);
      if (!Array.isArray(pillSrc) || pillSrc.length === 0) { remove("s6"); }
      else {
        const ebText = String(v.pills_title || v.levels_title || "").trim();
        if (!ebText) remove("s6eb"); else setText("s6lbl", ebText);
        const host = document.getElementById("s6pills");
        pillSrc.slice(0, 4).forEach((lv, i) => {
          const pill = document.createElement("div"); pill.className = "pill bento"; pill.id = "pill" + i;
          const pic = document.createElement("div"); pic.className = "pic";
          pic.appendChild(makeIconSVG(pickIconKey(lv.label, i)));
          const pt = document.createElement("div"); pt.className = "pt"; pt.textContent = lv.label == null ? "" : String(lv.label);
          pill.appendChild(pic); pill.appendChild(pt); host.appendChild(pill);
        });
      }

      // ── S_donut: vòng tròn % ──
      const donutData = parseJSON(v.donut, null);
      let donutNum = null, donutIsNum = false;
      if (!donutData || !String(donutData.value || "").trim()) { remove("s_donut"); }
      else {
        const lab = String(donutData.label || "").trim();
        setText("dnLbl", "Tỉ lệ");                 // eyebrow = TAG NGẮN (tránh lặp với caption dưới)
        if (lab) setText("dnText", lab); else remove("dnText");
        const n = Number(String(donutData.value).replace(/[^\d.-]/g, ""));
        donutIsNum = Number.isFinite(n);
        if (donutIsNum) { donutNum = n; setText("dnUnit", donutData.unit || "%"); }
        else { setText("dnNum", String(donutData.value)); remove("dnUnit"); }
      }

      // ── S_ba: before → after ──
      const baData = parseJSON(v.before_after, null);
      let baInfo = null;
      if (!baData || !String(baData.fromValue || "").trim() || !String(baData.toValue || "").trim()) { remove("s_ba"); }
      else {
        setText("baLbl", String(baData.label || "Trước & Sau")); // luôn có nhãn eyebrow (hết trơ)
        setText("baFromL", baData.fromLabel || "Trước");
        setText("baToL", baData.toLabel || "Sau");
        const unit = baData.unit ? String(baData.unit) : "";   // đơn vị ở SPAN riêng (.bu nhỏ) → số gọn 1 dòng
        setText("baFromU", unit); setText("baToU", unit);
        const fn = Number(String(baData.fromValue).replace(/[^\d.-]/g, ""));
        const tn = Number(String(baData.toValue).replace(/[^\d.-]/g, ""));
        const mx = Math.max(Math.abs(fn) || 0, Math.abs(tn) || 0, 1);
        baInfo = { from: fn, to: tn, fromIsNum: Number.isFinite(fn), toIsNum: Number.isFinite(tn), unit,
          fromR: Number.isFinite(fn) ? Math.max(0.08, Math.abs(fn) / mx) : 1,
          toR: Number.isFinite(tn) ? Math.max(0.08, Math.abs(tn) / mx) : 1 };
        if (!baInfo.fromIsNum) { setText("baFrom", String(baData.fromValue)); remove("baFromU"); }
        if (!baInfo.toIsNum) { setText("baTo", String(baData.toValue)); remove("baToU"); }
      }

      // ── S_mini: lưới mini-stat ──
      const miniData = parseJSON(v.mini_stats, []);
      const miniInfo = [];
      if (!Array.isArray(miniData) || miniData.length < 2) { remove("s_mini"); }
      else {
        setText("miLbl", String(v.mini_title || "Chỉ số"));
        const host = document.getElementById("miGrid");
        miniData.slice(0, 4).forEach((m, i) => {
          const card = document.createElement("div"); card.className = "ministat"; card.id = "mini" + i;
          const ic = document.createElement("div"); ic.className = "mi"; ic.appendChild(makeIconSVG(ICON_CYCLE[i % ICON_CYCLE.length]));
          const mv = document.createElement("div"); mv.className = "mv";
          const unit = m.unit ? String(m.unit) : "";
          const n = Number(String(m.value).replace(/[^\d.-]/g, ""));
          const isNum = Number.isFinite(n) && /\d/.test(String(m.value || ""));
          const mvn = document.createElement("span"); mvn.id = "mivn" + i; mvn.textContent = isNum ? "0" : String(m.value || "");
          const mu = document.createElement("span"); mu.className = "mu"; mu.textContent = unit;
          mv.appendChild(mvn); mv.appendChild(mu);
          const ml = document.createElement("div"); ml.className = "ml"; ml.textContent = String(m.label || "");
          card.appendChild(ic); card.appendChild(mv); card.appendChild(ml); host.appendChild(card);
          miniInfo.push({ i, num: n, isNum });
        });
      }

      // ── S_trend: đường tăng ──
      const trendData = parseJSON(v.trend, null);
      let trendLen = 0;
      const trendPts = (trendData && Array.isArray(trendData.points))
        ? trendData.points.map((p) => Number(String(p).replace(/[^\d.-]/g, ""))).filter((x) => Number.isFinite(x)) : [];
      if (trendPts.length < 2) { remove("s_trend"); }
      else {
        const lab = String((trendData && trendData.label) || "").trim();
        setText("trLbl", "Xu hướng");              // eyebrow = TAG NGẮN (tránh lặp caption dưới)
        if (lab) setText("trText", lab); else remove("trText");
        const mn = Math.min.apply(null, trendPts), mx = Math.max.apply(null, trendPts), rng = (mx - mn) || 1;
        const W = 600, H = 300, pad = 24;
        const coords = trendPts.map((val, i) => [
          pad + (i / (trendPts.length - 1)) * (W - 2 * pad),
          H - pad - ((val - mn) / rng) * (H - 2 * pad),
        ]);
        const ptsStr = coords.map((c) => c[0].toFixed(1) + "," + c[1].toFixed(1)).join(" ");
        const line = document.getElementById("trLine"); if (line) line.setAttribute("points", ptsStr);
        const area = document.getElementById("trArea");
        if (area) area.setAttribute("points", ptsStr + " " + (W - pad) + "," + (H - pad) + " " + pad + "," + (H - pad));
        const last = coords[coords.length - 1];
        const dot = document.getElementById("trDot");
        if (dot) { dot.style.left = (last[0] / W * 100) + "%"; dot.style.top = (last[1] / H * 100) + "%"; }
        const badge = document.getElementById("trBadge");
        if (badge) {
          const lastRaw = (trendData.points && trendData.points.length) ? String(trendData.points[trendData.points.length - 1]).trim() : String(trendPts[trendPts.length - 1]);
          badge.textContent = lastRaw; badge.style.left = (last[0] / W * 100) + "%"; badge.style.top = (last[1] / H * 100) + "%";
        }
        try { trendLen = line.getTotalLength(); } catch (e) { trendLen = 1400; }
        if (line) { line.style.strokeDasharray = trendLen; line.style.strokeDashoffset = trendLen; }
      }

      // ── Point scenes v2: MỖI điểm = THẺ HƯỚNG DẪN giàu data (tiêu đề bước + cách làm + số liệu). ──
      //   p = {n,total, title|text, detail, stat:{value,unit,label}}. Lấp khung + DẠY kiến thức + chiều sâu.
      const pointsData = parseJSON(v.points, []);
      const pointIds = [];
      if (Array.isArray(pointsData) && pointsData.length) {
        const root = document.getElementById("root");
        pointsData.slice(0, 5).forEach((p, i) => {
          const title = String((p && (p.title || p.text)) || "").trim();
          if (!title) return;
          const detail = String((p && p.detail) || "").trim();
          const stat = (p && p.stat && String(p.stat.value || "").trim())
            ? { value: String(p.stat.value).trim(), unit: String(p.stat.unit || "").trim(), label: String(p.stat.label || "").trim() } : null;
          const id = "spt" + i;
          const num = String((p && p.n) || i + 1);
          const total = (p && p.total) || pointsData.length;
          const iconKey = ICON_CYCLE[i % ICON_CYCLE.length];
          const sc = document.createElement("div");
          sc.className = "scene left ptscene bg-light clip"; sc.id = id;
          sc.setAttribute("data-start", "0"); sc.setAttribute("data-duration", "3.7"); sc.setAttribute("data-track-index", "1");
          const dg = document.createElement("div"); dg.className = "dotgrid"; sc.appendChild(dg);
          const wm = document.createElement("div"); wm.className = "ptwm"; wm.textContent = num; sc.appendChild(wm); // watermark số → chiều sâu
          const eb = document.createElement("div"); eb.className = "eyebrow icon";
          const ico = document.createElement("span"); ico.className = "ico"; ico.appendChild(makeIconSVG(iconKey));
          const ebl = document.createElement("span"); ebl.className = "lbl"; ebl.textContent = "ĐIỂM " + num + "/" + total;
          eb.appendChild(ico); eb.appendChild(ebl); sc.appendChild(eb);
          const wrap = document.createElement("div"); wrap.className = "ptwrap";
          const top = document.createElement("div"); top.className = "pttop";
          const tt = document.createElement("div"); tt.className = "pttitle"; tt.id = id + "tt"; fillKinetic(tt, title);
          top.appendChild(tt);
          if (detail) { const dt = document.createElement("div"); dt.className = "ptdetail"; dt.id = id + "det"; dt.textContent = detail; top.appendChild(dt); }
          wrap.appendChild(top);
          if (stat) {
            const scd = document.createElement("div"); scd.className = "ptstat bento-accent"; scd.id = id + "stat";
            const sval = document.createElement("div"); sval.className = "psval";
            const sv = document.createElement("span"); sv.className = "psv"; sv.id = id + "sv"; sv.textContent = stat.value;
            sval.appendChild(sv);
            if (stat.unit) { const su = document.createElement("span"); su.className = "psu"; su.textContent = stat.unit; sval.appendChild(su); }
            scd.appendChild(sval);
            if (stat.label) { const sl = document.createElement("div"); sl.className = "pslbl"; sl.textContent = stat.label; scd.appendChild(sl); }
            wrap.appendChild(scd);
          }
          sc.appendChild(wrap); root.appendChild(sc);
          pointIds.push(id);
        });
      }

      // ── S_flow: sơ đồ quy trình (pills dọc + mũi tên ↓) — học ref. Tạo ĐỘNG, ẩn nếu <2 bước. ──
      const flowData = parseJSON(v.flow, null);
      const flowSteps = flowData && Array.isArray(flowData.steps)
        ? flowData.steps.map((x) => String(x || "").trim()).filter(Boolean).slice(0, 4) : [];
      if (flowSteps.length >= 2) {
        const froot = document.getElementById("root");
        const sc = document.createElement("div");
        sc.className = "scene left bg-light clip"; sc.id = "s_flow";
        sc.setAttribute("data-start", "0"); sc.setAttribute("data-duration", "3.7"); sc.setAttribute("data-track-index", "1");
        const dg = document.createElement("div"); dg.className = "dotgrid"; sc.appendChild(dg);
        const eb = document.createElement("div"); eb.className = "eyebrow icon";
        const ico = document.createElement("span"); ico.className = "ico";
        ico.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><path d="M6 8.5v7"/><path d="M18 6.5a3 3 0 0 1-3 3H9"/></svg>';
        const ebl = document.createElement("span"); ebl.className = "lbl";
        ebl.textContent = String((flowData && flowData.title) || "Quy trình").toUpperCase().slice(0, 22);
        eb.appendChild(ico); eb.appendChild(ebl);
        const wrap = document.createElement("div"); wrap.className = "flowwrap";
        flowSteps.forEach((st, i) => {
          const last = i === flowSteps.length - 1;
          const pill = document.createElement("div");
          pill.className = "flowpill " + (last ? "bento-accent last" : "bento");
          const n = document.createElement("span"); n.className = "fpn"; n.textContent = String(i + 1);
          const t = document.createElement("span"); t.className = "fpt"; t.textContent = st;
          pill.appendChild(n); pill.appendChild(t); wrap.appendChild(pill);
          if (!last) {
            const ar = document.createElement("div"); ar.className = "flowarrow";
            ar.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m6 13 6 6 6-6"/></svg>';
            wrap.appendChild(ar);
          }
        });
        sc.appendChild(eb); sc.appendChild(wrap); froot.appendChild(sc);
      }

      // ── S_emph: callout bar + nguyên tắc (gradient) — ẩn cả scene nếu cả 2 rỗng ──
      const calloutTxt = String(v.callout || "").trim();
      const principleTxt = String(v.principle || "").trim();
      if (!calloutTxt && !principleTxt) { remove("s_emph"); }
      else {
        if (calloutTxt) setText("emphCallout", calloutTxt); else remove("emphCallout");
        if (principleTxt) setText("emphPrinciple", principleTxt); else remove("emphCard");
      }

      // ── S_cmp: so sánh 2 cột — ẩn nếu thiếu data ──
      const cmp = parseJSON(v.compare, null);
      const cmpOK = cmp && String(cmp.leftTitle || "").trim() && Array.isArray(cmp.leftItems) && cmp.leftItems.length;
      if (!cmpOK) { remove("s_cmp"); }
      else {
        const grid = document.getElementById("cmpGrid");
        const mk = (side, title, items) => {
          const c = document.createElement("div"); c.className = "ccard " + side + (side === "r" ? " bento-accent" : " bento");
          const t = document.createElement("div"); t.className = "ct"; t.textContent = String(title || ""); c.appendChild(t);
          const list = document.createElement("div"); list.className = "cslist"; // bullets căn giữa vùng dưới tiêu đề → lấp đều cột
          (items || []).slice(0, 3).forEach((it) => { const d = document.createElement("div"); d.className = "cs"; d.textContent = "• " + String(it); list.appendChild(d); });
          c.appendChild(list);
          return c;
        };
        grid.appendChild(mk("l", cmp.leftTitle, cmp.leftItems));
        grid.appendChild(mk("r", cmp.rightTitle || "Với AI", cmp.rightItems || []));
      }

      // ── S5 CTA (center) ──
      setText("s7e1", v.cta_top);
      (function () {
        const e2 = document.getElementById("s7e2"); if (!e2) return; e2.textContent = "";
        const text = String(v.cta_keyword || ""); const hl = String(v.cta_hl || "").trim();
        const idx = hl ? text.toLowerCase().indexOf(hl.toLowerCase()) : -1;
        if (hl && idx >= 0) {
          if (idx > 0) e2.appendChild(document.createTextNode(text.slice(0, idx)));
          const sp = document.createElement("span"); sp.className = "e2hl"; sp.textContent = text.slice(idx, idx + hl.length); e2.appendChild(sp);
          const after = text.slice(idx + hl.length); if (after) e2.appendChild(document.createTextNode(after));
        } else e2.textContent = text;
      })();
      (function () {
        const e3 = document.getElementById("s7e3"); if (!e3) return;
        // C3 v2: bỏ emoji tay 👇 → dùng mũi tên SVG (chuyên nghiệp hơn, đã có sẵn trong HTML #s7e3).
        setText("s7e3text", v.cta_sub || "");
      })();

      // ── AUTO-FIT chữ lớn ──
      function fitText(id, maxPx, minPx, maxH) {
        const el = document.getElementById(id); if (!el || !String(el.textContent || "").trim()) return;
        el.style.lineHeight = el.style.lineHeight || "1.12";
        let lo = minPx, hi = maxPx, best = minPx;
        for (let i = 0; i < 12; i++) {
          const mid = (lo + hi) / 2; el.style.fontSize = mid + "px";
          const fitsW = el.scrollWidth <= el.clientWidth + 1; const fitsH = el.scrollHeight <= maxH;
          if (fitsW && fitsH) { best = mid; lo = mid; } else { hi = mid; }
        }
        el.style.fontSize = Math.floor(best) + "px";
      }
      const CF = String(v.compact || "") === "1" ? 0.82 : 1;
      const FT = (id, mx, mn, mh) => fitText(id, Math.round(mx * CF), mn, Math.round(mh * CF));
      // doFit chạy 2 lần: ngay khi load + LẠI sau khi web-font sẵn sàng (FT đo lúc chưa có font sẽ
      // hụt bề rộng → text to bị tràn khi font thật load. Re-fit khử triệt để).
      function doFit() {
        const s2n = document.getElementById("s2num");
        if (s2n && bigRaw !== "") s2n.textContent = bigIsNum ? bigNum.toLocaleString("vi-VN") : bigRaw; // đo theo giá trị CUỐI
        FT("s1key", 150, 48, 320); FT("s1l1", 78, 40, 180); FT("s1l2", 78, 40, 180); FT("s1sub", 44, 24, 120);
        FT("s2bnum", 450, 110, 680); FT("s7e1", 80, 36, 200); FT("s7e2", 150, 44, 520); FT("s7e3text", 44, 24, 120);
        (pointIds || []).forEach((id) => FT(id + "tt", 80, 38, 330)); // tiêu đề bước (chừa chỗ cách làm + thẻ số)
        if (s2n && bigIsNum) s2n.textContent = "0"; // reset → count-up chạy từ 0
      }
      doFit();
      try { if (document.fonts && document.fonts.ready && document.fonts.ready.then) document.fonts.ready.then(doFit); } catch (e) {}

      // ── Timing: scene_times (ĐỒNG BỘ giọng đọc qua Whisper) nếu có; nếu không → chia đều ──
      const total = parseFloat(v.duration) || 18.5;
      const order = ["s1", "s2", "s_donut", "s_flow", "s_ba", "s4b", "s_mini", "s_trend", ...pointIds, "s6", "s_emph", "s_cmp", "s7"];
      let visible = order.filter((id) => document.getElementById(id));
      const N = Math.max(1, visible.length);
      const startOf = {}, winOf = {};
      const sceneTimes = parseJSON(v.scene_times, null);
      const haveTimes = sceneTimes && typeof sceneTimes === "object" && !Array.isArray(sceneTimes);
      if (haveTimes) {
        let cursor = 0;
        visible.forEach((id) => {
          const t = sceneTimes[id] || {};
          let s = isFinite(t.start) ? Number(t.start) : cursor;
          let d = isFinite(t.dur) && Number(t.dur) > 0 ? Number(t.dur) : Math.max(0.5, total - s);
          s = Math.max(0, Math.min(s, Math.max(0, total - 0.3)));
          d = Math.max(0.3, Math.min(d, total - s));
          startOf[id] = +s.toFixed(3); winOf[id] = +d.toFixed(3);
          cursor = s + d;
        });
        // Sắp theo thời gian thật → cảnh cuối (theo giờ) mới không fade-out.
        visible = visible.slice().sort((a, b) => startOf[a] - startOf[b]);
      } else {
        const win = total / N;
        visible.forEach((id, i) => { startOf[id] = +(i * win).toFixed(3); winOf[id] = win; });
      }
      visible.forEach((id) => {
        const el = document.getElementById(id);
        el.setAttribute("data-start", String(startOf[id]));
        el.setAttribute("data-duration", winOf[id].toFixed(3));
      });
      const bgEl = document.getElementById("bgbase");
      if (bgEl) { bgEl.setAttribute("data-start", "0"); bgEl.setAttribute("data-duration", total.toFixed(3)); }
      const has = (id) => startOf[id] != null;

      // ── GSAP timeline (paused, deterministic) ──
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      gsap.defaults({ ease: "power3.out" });

      // Nền SỐNG: glow blob trôi chậm + phình nhẹ suốt clip (transform-only → rẻ trên software render).
      if (document.getElementById("glowblob"))
        tl.fromTo("#glowblob", { x: -40, y: -20, scale: 0.92 },
          { x: 260, y: 200, scale: 1.18, duration: Math.max(2, total / 2), ease: "sine.inOut", yoyo: true, repeat: 1 }, 0);

      // Thanh tiến trình chạy suốt clip (lấp đáy).
      if (document.getElementById("progressFill"))
        tl.fromTo("#progressFill", { scaleX: 0 }, { scaleX: 1, duration: total, ease: "none" }, 0);

      // Cross-fade scene (RẺ — chỉ opacity).
      visible.forEach((id, i) => {
        const sel = "#" + id, s = startOf[id], w = winOf[id];
        tl.fromTo(sel, { opacity: 0 }, { opacity: 1, duration: 0.28, ease: "power1.out" }, s);
        if (i < N - 1) tl.to(sel, { opacity: 0, duration: 0.22, ease: "power1.in" }, s + w - 0.22);
      });

      /* S1 hero */
      if (has("s1")) {
        const s = startOf.s1;
        if (document.getElementById("s1eb")) tl.from("#s1eb", { y: 16, opacity: 0, duration: 0.4 }, s + 0.1);
        if (document.getElementById("s1key"))
          tl.fromTo("#s1key", { scale: 0.55, opacity: 0, filter: "blur(8px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.7)" }, s + 0.2);
        tl.from("#s1l1 .word", { yPercent: 120, opacity: 0, duration: 0.45, stagger: 0.07 }, s + 0.55);
        if (document.getElementById("s1l2")) tl.from("#s1l2 .word", { yPercent: 120, opacity: 0, duration: 0.45, stagger: 0.07 }, s + 0.8);
        if (document.getElementById("s1sub")) tl.fromTo("#s1sub", { y: 22, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45 }, s + 1.1);
        if (document.getElementById("heroWrap")) {
          tl.fromTo("#heroWrap", { scale: 0.94, opacity: 0, y: 24 }, { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "back.out(1.4)" }, s + 0.5);
          // Mid-scene: thẻ 3D "thở" nhẹ (breathing float) — không tĩnh.
          tl.to("#heroWrap", { y: "-=16", duration: Math.max(1, (winOf.s1 || 3.7) / 2), yoyo: true, repeat: 1, ease: "sine.inOut" }, s + 1.2);
        }
      }

      /* S2 big number */
      if (has("s2")) {
        const s = startOf.s2;
        tl.from("#s2 .bentohost", { y: 32, scale: 0.97, duration: 0.5, ease: "back.out(1.3)" }, s + 0.04);
        if (document.getElementById("s2eb")) tl.from("#s2eb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        if (bigIsNum) {
          const cc = { v: 0 };
          tl.to(cc, { v: bigNum, duration: 0.6, ease: "power3.out",
            onUpdate: () => { const e = document.getElementById("s2num"); if (e) e.textContent = Math.round(cc.v).toLocaleString("vi-VN"); } }, s + 0.2);
        } else {
          tl.from("#s2num", { scale: 0.6, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, s + 0.2);
        }
        if (document.getElementById("s2label")) tl.from("#s2label", { y: 16, opacity: 0, duration: 0.35 }, s + 0.8);
        tl.to("#s2bnum", { scale: 1.03, duration: Math.max(1, (winOf.s2 || 3.7) / 2), yoyo: true, repeat: 1, ease: "sine.inOut", overwrite: "auto" }, s + 1.0);
      }

      /* S3 progress bars */
      if (has("s4b")) {
        const s = startOf.s4b;
        if (document.getElementById("s4eb")) tl.from("#s4eb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        barNums.forEach((i) => {
          tl.from("#brow" + i, { x: -40, opacity: 0, duration: 0.45, ease: "expo.out" }, s + 0.25 + i * 0.12);
          tl.fromTo("#bfill" + i, { scaleX: 0 }, { scaleX: 1, duration: 0.65, ease: "power3.out" }, s + 0.4 + i * 0.12);
          // vệt sáng quét qua thanh sau khi đầy → motion-graphics, không tĩnh
          tl.fromTo("#bsheen" + i, { x: -160 }, { x: 1240, duration: 0.75, ease: "power2.in" }, s + 0.95 + i * 0.12);
        });
        // DATA MOTION: giá trị mỗi bar ĐẾM TĂNG dần từ 0 (khớp lúc thanh mọc).
        barInfo.forEach((bi) => {
          if (!bi.isNum) return;
          const cc = { v: 0 };
          tl.to(cc, { v: bi.num, duration: 0.7, ease: "power2.out",
            onUpdate: () => { const e = document.getElementById("bval" + bi.i); if (e) e.textContent = Math.round(cc.v).toLocaleString("vi-VN") + bi.unit; } }, s + 0.4 + bi.i * 0.12);
        });
        // KHOẢNH KHẮC: bar THẮNG "nảy" nhẹ + hút mắt sau khi tất cả đầy.
        const winRow = document.querySelector("#s4bars .pbar.win");
        if (winRow) tl.to(winRow, { scale: 1.035, duration: 0.32, yoyo: true, repeat: 1, ease: "back.out(2.2)", transformOrigin: "left center" }, s + 1.5);
      }

      /* S_donut: vòng tròn quét + số đếm */
      if (has("s_donut")) {
        const s = startOf.s_donut;
        tl.from("#s_donut .bentohost", { y: 32, scale: 0.97, duration: 0.5, ease: "back.out(1.3)" }, s + 0.04);
        if (document.getElementById("dnEb")) tl.from("#dnEb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        if (donutIsNum && donutNum != null) {
          const CIRC = 578, off = CIRC * (1 - Math.max(0, Math.min(100, donutNum)) / 100);
          tl.fromTo("#dnFill", { strokeDashoffset: CIRC }, { strokeDashoffset: off, duration: 1.0, ease: "power2.out" }, s + 0.3);
          const cc = { v: 0 };
          tl.to(cc, { v: donutNum, duration: 1.0, ease: "power2.out",
            onUpdate: () => { const e = document.getElementById("dnNum"); if (e) e.textContent = Math.round(cc.v).toLocaleString("vi-VN"); } }, s + 0.3);
        } else {
          tl.from(".dcenter", { scale: 0.7, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, s + 0.3);
        }
        if (document.getElementById("dnText")) tl.from("#dnText", { y: 16, opacity: 0, duration: 0.4 }, s + 0.95);
      }

      /* S_ba: before → after */
      if (has("s_ba")) {
        const s = startOf.s_ba;
        if (document.getElementById("baEb")) tl.from("#baEb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        tl.from("#s_ba .baside.l", { x: -30, opacity: 0, duration: 0.5, ease: "back.out(1.4)" }, s + 0.3);
        tl.from("#s_ba .baarrow", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.7)" }, s + 0.55);
        tl.from("#s_ba .baside.r", { x: 30, opacity: 0, duration: 0.5, ease: "back.out(1.4)" }, s + 0.7);
        if (baInfo && baInfo.fromIsNum) { const c = { v: 0 }; tl.to(c, { v: baInfo.from, duration: 0.7, ease: "power2.out", onUpdate: () => { const e = document.getElementById("baFrom"); if (e) e.textContent = Math.round(c.v).toLocaleString("vi-VN"); } }, s + 0.45); }
        if (baInfo && baInfo.toIsNum) { const c = { v: 0 }; tl.to(c, { v: baInfo.to, duration: 0.7, ease: "power2.out", onUpdate: () => { const e = document.getElementById("baTo"); if (e) e.textContent = Math.round(c.v).toLocaleString("vi-VN"); } }, s + 0.85); }
        // thanh tỉ lệ mọc (số to → thanh dài) — lấp đáy thẻ + tăng tính data
        if (baInfo) {
          tl.fromTo("#baFromBar", { scaleX: 0 }, { scaleX: baInfo.fromR, duration: 0.7, ease: "power3.out" }, s + 0.5);
          tl.fromTo("#baToBar", { scaleX: 0 }, { scaleX: baInfo.toR, duration: 0.7, ease: "power3.out" }, s + 0.9);
        }
      }

      /* S_mini: lưới mini-stat — vào lần lượt + số đếm */
      if (has("s_mini")) {
        const s = startOf.s_mini;
        if (document.getElementById("miEb")) tl.from("#miEb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        tl.from("#miGrid .ministat", { y: 30, opacity: 0, duration: 0.45, stagger: 0.1, ease: "back.out(1.5)" }, s + 0.3);
        miniInfo.forEach((mi) => { if (!mi.isNum) return; const c = { v: 0 }; tl.to(c, { v: mi.num, duration: 0.7, ease: "power2.out", onUpdate: () => { const e = document.getElementById("mivn" + mi.i); if (e) e.textContent = Math.round(c.v).toLocaleString("vi-VN"); } }, s + 0.5 + mi.i * 0.1); });
      }

      /* S_trend: đường vẽ dần + chấm cuối + badge đỉnh */
      if (has("s_trend")) {
        const s = startOf.s_trend;
        tl.from("#s_trend .bentohost", { y: 32, scale: 0.97, duration: 0.5, ease: "back.out(1.3)" }, s + 0.04);
        if (document.getElementById("trEb")) tl.from("#trEb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        if (trendLen) tl.fromTo("#trLine", { strokeDashoffset: trendLen }, { strokeDashoffset: 0, duration: 1.1, ease: "power2.inOut" }, s + 0.3);
        if (document.getElementById("trArea")) tl.from("#trArea", { opacity: 0, duration: 0.8 }, s + 0.6);
        if (document.getElementById("trDot")) tl.from("#trDot", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.8)" }, s + 1.25);
        if (document.getElementById("trBadge")) tl.from("#trBadge", { opacity: 0, duration: 0.45 }, s + 1.4); // chỉ opacity (giữ translate căn giữa của CSS)
        if (document.getElementById("trText")) tl.from("#trText", { y: 16, opacity: 0, duration: 0.4 }, s + 0.95);
      }

      /* S4 pills */
      if (has("s6")) {
        const s = startOf.s6;
        if (document.getElementById("s6eb")) tl.from("#s6eb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        tl.from("#s6pills .pill", { y: 30, opacity: 0, duration: 0.45, stagger: 0.1, ease: "back.out(1.5)" }, s + 0.3);
        // mid-scene: icon trong từng pill "nảy" lần lượt thành sóng → sống động
        for (let i = 0; i < 4; i++)
          if (document.getElementById("pill" + i))
            tl.to("#pill" + i + " .pic", { scale: 1.16, duration: 0.32, yoyo: true, repeat: 1, ease: "sine.inOut" }, s + 0.95 + i * 0.42);
      }

      /* S_emph */
      if (has("s_emph")) {
        const s = startOf.s_emph;
        if (document.getElementById("emphEb")) tl.from("#emphEb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.1);
        if (document.getElementById("emphCallout")) tl.from("#emphCallout", { x: -40, opacity: 0, duration: 0.45, ease: "expo.out" }, s + 0.2);
        if (document.getElementById("emphCard")) {
          tl.fromTo("#emphCard", { y: 36, opacity: 0, scale: 0.96 }, { y: 0, opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, s + 0.4);
          // mid-scene: thẻ gradient "thở" nhẹ
          tl.to("#emphCard", { scale: 1.018, duration: Math.max(1, (winOf.s_emph || 3.7) / 2), yoyo: true, repeat: 1, ease: "sine.inOut" }, s + 1.0);
        }
      }

      /* S_cmp */
      if (has("s_cmp")) {
        const s = startOf.s_cmp;
        if (document.getElementById("cmpEb")) tl.from("#cmpEb", { x: -30, opacity: 0, duration: 0.4 }, s + 0.12);
        tl.from("#cmpGrid .ccard", { y: 36, opacity: 0, duration: 0.5, stagger: 0.14, ease: "back.out(1.4)" }, s + 0.3);
        // mid-scene: cột "với AI" (gradient) trôi nổi nhẹ
        tl.to("#cmpGrid .ccard.r", { y: "-=12", duration: Math.max(1, (winOf.s_cmp || 3.7) / 2), yoyo: true, repeat: 1, ease: "sine.inOut" }, s + 1.0);
      }

      /* S5 CTA */
      if (has("s7")) {
        const s = startOf.s7;
        tl.from("#s7e1", { y: 24, opacity: 0, duration: 0.4 }, s + 0.12);
        tl.fromTo("#s7e2", { scale: 0.5, opacity: 0, filter: "blur(8px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.7)" }, s + 0.35);
        tl.to("#s7e2", { scale: 1.04, duration: Math.max(0.8, (winOf.s7 || 3.7) / 3), yoyo: true, repeat: 1, ease: "sine.inOut", overwrite: "auto" }, s + 1.0);
        if (document.getElementById("s7e3")) tl.from("#s7e3", { y: 20, opacity: 0, duration: 0.4 }, s + 0.7);
      }

      /* Point scenes v2 — thẻ hướng dẫn: watermark số + eyebrow + tiêu đề KINETIC + cách làm + thẻ số liệu POP */
      (pointIds || []).forEach((id) => {
        if (!has(id)) return;
        const s = startOf[id];
        if (document.querySelector("#" + id + " .ptwm"))
          tl.fromTo("#" + id + " .ptwm", { opacity: 0, scale: 0.82, x: 36 }, { opacity: 0.07, scale: 1, x: 0, duration: 0.7, ease: "power2.out" }, s + 0.1);
        tl.from("#" + id + " .eyebrow", { y: 18, opacity: 0, duration: 0.4 }, s + 0.12);
        if (document.querySelector("#" + id + " .pttop")) // thẻ DẠY hiện như 1 khối → rồi chữ chạy lên trên
          tl.fromTo("#" + id + " .pttop", { y: 34, opacity: 0, scale: 0.97 }, { y: 0, opacity: 1, scale: 1, duration: 0.5, ease: "power3.out" }, s + 0.2);
        tl.from("#" + id + " .pttitle .word", { yPercent: 80, opacity: 0, duration: 0.5, stagger: 0.06, ease: "power3.out" }, s + 0.34);
        if (document.querySelector("#" + id + " .ptdetail"))
          tl.from("#" + id + " .ptdetail", { y: 22, opacity: 0, duration: 0.5, ease: "power2.out" }, s + 0.66);
        if (document.querySelector("#" + id + " .ptstat")) {
          tl.fromTo("#" + id + " .ptstat", { y: 42, opacity: 0, scale: 0.94 }, { y: 0, opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.5)" }, s + 0.82);
          tl.fromTo("#" + id + " .psv", { scale: 0.6, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.7)" }, s + 1.0);
        }
      });

      tl.to({}, { duration: 0.001 }, Math.max(0, total - 0.001));
      // ── Caption SYNC (karaoke): render phụ đề theo thời gian timeline (chạy cả khi seek từng frame) ──
      let CAPS = [];
      try { CAPS = JSON.parse(v.captions || "[]"); } catch (e) { CAPS = []; }
      if (Array.isArray(CAPS) && CAPS.length) {
        document.documentElement.setAttribute("data-caps", "1");
        const capbox = document.getElementById("capbox");
        const escc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
        const renderCap = (t) => {
          let p = null;
          for (let i = 0; i < CAPS.length; i++) { if (t >= CAPS[i].s && t < CAPS[i].e) { p = CAPS[i]; break; } }
          if (!p && CAPS.length && t >= CAPS[CAPS.length - 1].s) p = CAPS[CAPS.length - 1];
          if (!p) { capbox.style.opacity = "0"; return; }
          capbox.style.opacity = "1";
          const key = String(p.s);
          if (capbox.dataset.k !== key) {
            capbox.dataset.k = key;
            capbox.innerHTML = (p.w || []).map((wd) => '<span class="cw" data-t="' + wd.t + '">' + escc(wd.x) + "</span>").join("");
          }
          let curIdx = -1;
          const ws = p.w || [];
          for (let i = 0; i < ws.length; i++) { if (t >= ws[i].t) curIdx = i; }
          const sp = capbox.children;
          for (let i = 0; i < sp.length; i++) sp[i].className = "cw" + (i < curIdx ? " said" : i === curIdx ? " cur" : "");
        };
        const prevCb = tl.eventCallback("onUpdate");
        tl.eventCallback("onUpdate", () => { if (prevCb) prevCb(); renderCap(tl.time()); });
        renderCap(0);
      }
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
