  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../assets/fonts/be-vietnam-pro.css" />
    <script src="../vendor/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden; background: var(--bg2, #f3f0fb);
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
      }
      :root {
        --bg1: #f4f0fc; --bg2: #e9e3f8; --accent: #7c3aed; --accent2: #a78bfa;
        --ink: #1e1b2e; --sub: #6b6480; --card: #ffffff; --glow: rgba(124,58,237,0.16);
        /* mode-dependent (theme JS ghi đè cho dark) — mặc định = light */
        --card-border: rgba(120,90,210,0.08); --grid-dot: rgba(124,58,237,0.06);
        --good: #16a34a; --bad: #dc2626; --warn: #d97706;
        /* alpha-tint của ACCENT (Phase 2 token hoá): default = tím cũ; JS tính lại từ
           accent thật của BrandKit/theme → đổi accent là MỌI tint đổi theo, hết tím cứng */
        --acc-a03: rgba(124,58,237,0.03); --acc-a06: rgba(124,58,237,0.06);
        --acc-a08: rgba(124,58,237,0.08); --acc-a10: rgba(124,58,237,0.10);
        --acc-a12: rgba(124,58,237,0.12); --acc-a14: rgba(124,58,237,0.14);
        --acc-a16: rgba(124,58,237,0.16); --acc-a18: rgba(124,58,237,0.18);
        --acc-a25: rgba(124,58,237,0.25); --acc-a38: rgba(124,58,237,0.38);
        /* hệ ELEVATION 2 lớp (depth premium): 1 bóng tight ghì thẻ + 1 bóng to mềm nâng thẻ */
        --elev-1: 0 2px 6px rgba(80,62,158,0.05), 0 16px 42px rgba(80,62,158,0.13);
        --elev-2: 0 4px 12px rgba(80,62,158,0.10), 0 24px 58px var(--glow);
      }
      #root { position: relative; width: 1080px; height: 1920px; }

      /* ── Scene base ── */
      .scene { position: absolute; inset: 0; width: 1080px; height: 1920px; overflow: hidden; display: flex; }
      /* center (Hero, CTA) */
      .scene.center { flex-direction: column; justify-content: center; align-items: center; padding: 0 80px; text-align: center; }
      /* left (bố cục mẫu): bám lề trái, KHỐI căn GIỮA dọc (hết trống đáy) */
      /* FILL khung header→đáy: stack dãn đầy, nội dung phân bố (poster cho cảnh 1-khối, fill cho lưới).
         → hết "band trống" giữa header và nội dung. */
      .scene.left { flex-direction: column; justify-content: flex-start; align-items: stretch; padding: 168px 72px 150px; text-align: left; }
      .scene.left .stack { display: flex; flex-direction: column; gap: 34px; width: 100%; flex: 1 1 auto; justify-content: space-between; }
      /* host nội dung dạng lưới/nhiều mục → chiếm hết chỗ trống còn lại (dưới eyebrow) */
      .scene.left .pbars, .scene.left .pill2, .scene.left .minigrid, .scene.left .compare, .scene.left .steps,
      .scene.left .bawrap { flex: 1 1 auto; }
      /* donut/trend giữ kích thước cố định (flex:1 sẽ méo vòng tròn / giãn đồ thị) — căn giữa khối */
      #s_donut .donutwrap, #s_trend .trendwrap { align-self: center; }
      /* cảnh 2-khối (callout + principle): eyebrow neo đỉnh + group căn giữa phần còn lại */
      .scene.left .emphgroup { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: flex-start; gap: 30px; min-height: 0; }
      /* cảnh point + cảnh 1-phần-tử → KHỐI bento lấp hết khung (tile/host flex:1) */
      .scene.left .ptbento, .scene.left .bentohost { flex: 1 1 auto; min-height: 0; }

      .bg-light {
        background:
          radial-gradient(90% 60% at 50% 8%, var(--glow) 0%, rgba(255,255,255,0) 55%),
          radial-gradient(80% 50% at 85% 100%, rgba(245,158,11,0.07) 0%, rgba(255,255,255,0) 50%),
          linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 100%);
      }
      .dotgrid {
        position: absolute; inset: 0; pointer-events: none;
        background-image: radial-gradient(var(--grid-dot) 1.4px, transparent 1.4px);
        background-size: 46px 46px;
        -webkit-mask-image: radial-gradient(85% 75% at 50% 45%, #000 30%, transparent 82%);
        mask-image: radial-gradient(85% 75% at 50% 45%, #000 30%, transparent 82%);
      }

      /* ── Eyebrow: dot-pill (center) + icon-square (left) ── */
      .eyebrow { display: inline-flex; align-items: center; gap: 12px; }
      .eyebrow.dot { align-self: center; background: var(--acc-a10); color: var(--accent);
        font-weight: 800; font-size: 32px; letter-spacing: 2px; text-transform: uppercase; padding: 12px 26px; border-radius: 999px; }
      .eyebrow.dot::before { content: ""; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); }
      /* Icon glow semantic (học ref): square lớn + gradient + box-shadow glow → nổi bật, premium 2 mode */
      .eyebrow.icon .ico { width: 58px; height: 58px; border-radius: 16px;
        background: linear-gradient(150deg, var(--accent), var(--accent2)); color: #fff;
        box-shadow: 0 6px 22px var(--glow), inset 0 1px 0 rgba(255,255,255,0.28);
        display: flex; align-items: center; justify-content: center; }
      .eyebrow.icon .ico svg { width: 30px; height: 30px; }
      .eyebrow.icon .lbl { color: var(--sub); font-weight: 800; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; }

      /* ── S_flow: sơ đồ quy trình (pills dọc + mũi tên ↓) — học ref. Pill cuối highlight (đích). ── */
      .flowwrap { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: center; margin-top: 44px; }
      .flowpill { display: flex; align-items: center; gap: 28px; padding: 34px 38px; }
      .flowpill .fpn { flex: 0 0 64px; width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(150deg, var(--accent), var(--accent2)); color: #fff; font-weight: 900; font-size: 32px; box-shadow: 0 6px 18px var(--glow); }
      .flowpill .fpt { color: var(--ink); font-weight: 700; font-size: 46px; line-height: 1.22; }
      .flowpill.last { color: #fff; }
      .flowpill.last .fpt { color: #fff; }
      .flowpill.last .fpn { background: rgba(255,255,255,0.22); box-shadow: inset 0 1px 0 rgba(255,255,255,0.3); }
      .flowarrow { display: flex; justify-content: center; align-items: center; height: 50px; color: var(--accent); opacity: 0.85; }
      .flowarrow svg { width: 38px; height: 38px; }

      /* ── Headline ── */
      .h-title { color: var(--ink); font-weight: 900; font-size: 76px; line-height: 1.08; letter-spacing: -0.5px; }
      .h-title .ac { color: var(--accent); }

      /* ── Bento card primitives ── */
      .bento { background: var(--card); border-radius: 22px; border: 1px solid var(--card-border);
        box-shadow: var(--elev-1); }
      .bento-accent { background: linear-gradient(150deg, var(--accent), var(--accent2)); color: #fff; border-radius: 22px; box-shadow: var(--elev-2); }
      /* SHEEN kính: vệt sáng góc trên-trái trên thẻ gradient → chiều sâu 3D, premium (không dùng blur → render nhanh) */
      .bento-accent, .pt-num.grad, .baside.r { position: relative; overflow: hidden; }
      .bento-accent::before, .pt-num.grad::before, .baside.r::before {
        content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0;
        background: radial-gradient(125% 92% at 14% -12%, rgba(255,255,255,0.20), rgba(255,255,255,0) 56%); }
      .bento-accent > *, .pt-num.grad > *, .baside.r > * { position: relative; z-index: 1; }

      /* pill2 (2×2) — icon-led (đúng style donnie). Hàng dãn ĐỀU (1fr) → hết hở giữa */
      .pill2 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 26px; }
      /* feature tile: icon + nhãn gom GIỮA (cohesive) → breathing đối xứng, gọn gàng */
      .pill { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 26px; padding: 40px 34px; will-change: transform, opacity; }
      .pill .pic { flex: 0 0 auto; width: 96px; height: 96px; border-radius: 24px; background: var(--acc-a12);
        display: flex; align-items: center; justify-content: center; will-change: transform; }
      .pill .pic svg { width: 50px; height: 50px; stroke: var(--accent); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .pill .pn { flex: 0 0 48px; width: 48px; height: 48px; border-radius: 14px; background: var(--acc-a12);
        color: var(--accent); font-weight: 900; font-size: 26px; display: flex; align-items: center; justify-content: center; }
      .pill .pt { color: var(--ink); font-weight: 700; font-size: 44px; line-height: 1.22; }

      /* listcard */
      .listcard { display: flex; flex-direction: column; gap: 20px; }
      .lrow { display: flex; align-items: flex-start; gap: 18px; padding: 26px 30px; will-change: transform, opacity; }
      .lrow .bullet { flex: 0 0 16px; width: 16px; height: 16px; margin-top: 12px; border-radius: 50%; background: var(--accent); }
      .lrow .lt { color: var(--ink); font-weight: 600; font-size: 38px; line-height: 1.25; }

      /* callout (thanh tím) */
      .callout { background: var(--acc-a08); border-left: 8px solid var(--accent); border-radius: 18px;
        padding: 40px 38px; color: var(--ink); font-weight: 600; font-size: 44px; line-height: 1.32; will-change: transform, opacity; }
      .callout b { color: var(--accent); font-weight: 900; }

      /* emph (gradient) — thẻ nguyên tắc là HERO: fill phần dưới, nội dung căn giữa */
      .emph { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; padding: 56px 48px; will-change: transform, opacity; }
      .emph .eb { color: rgba(255,255,255,0.85); font-weight: 800; font-size: 30px; letter-spacing: 2px; text-transform: uppercase; }
      .emph .em { color: #fff; font-weight: 800; font-size: 66px; line-height: 1.16; margin-top: 16px; }

      /* compare (2 cột) */
      .compare { display: grid; grid-template-columns: 0.92fr 1.08fr; gap: 26px; width: 100%; align-items: stretch; }
      .ccard { padding: 52px 40px; text-align: left; will-change: transform, opacity; display: flex; flex-direction: column; justify-content: center; gap: 30px; }
      .ccard .ct { font-weight: 800; font-size: 50px; line-height: 1.1; padding-bottom: 22px; border-bottom: 2px solid var(--acc-a16); }
      .ccard.r .ct { border-bottom-color: rgba(255,255,255,0.28); }
      .ccard .cslist { flex: 0 0 auto; display: flex; flex-direction: column; justify-content: flex-start; gap: 28px; }
      .ccard .cs { font-weight: 500; font-size: 37px; line-height: 1.32; }
      .ccard.l { color: var(--ink); } .ccard.l .cs { color: var(--sub); }
      .ccard.r .ct, .ccard.r .cs { color: #fff; }
      /* CONTRAST: cột "Với AI" NỔI hơn (rộng hơn ở grid + bóng đậm) — mắt dừng ở giải pháp */
      .ccard.r { box-shadow: var(--elev-2); position: relative; z-index: 2; }

      /* progress bars */
      .pbars { display: flex; flex-direction: column; gap: 40px; justify-content: center; }
      .pbar { will-change: transform, opacity; padding: 38px 34px; }
      .pbar .pl { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
      .pbar .pn { color: var(--ink); font-weight: 800; font-size: 42px; }
      .pbar .pv { color: var(--accent); font-weight: 900; font-size: 46px; white-space: nowrap; font-variant-numeric: tabular-nums; }
      .pbar .ptrack { position: relative; height: 44px; border-radius: 22px; background: var(--acc-a10); overflow: hidden; }
      .pbar .pfill { position: relative; height: 100%; border-radius: 18px; background: linear-gradient(90deg, var(--accent2), var(--accent));
        transform-origin: left center; transform: scaleX(0); will-change: transform; overflow: hidden; }
      /* sheen: vệt sáng quét qua thanh sau khi đầy (motion-graphics, không tĩnh) */
      .pbar .sheen { position: absolute; top: 0; bottom: 0; width: 120px; transform: translateX(-160px) skewX(-18deg);
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0) 100%); will-change: transform; }
      /* CONTRAST: bar GIÁ TRỊ CAO NHẤT nổi bật (viền accent + nền tint + bóng) */
      .pbar.win { background: linear-gradient(135deg, var(--acc-a10), var(--acc-a03));
        border: 2px solid var(--acc-a38); box-shadow: 0 18px 44px var(--glow); }
      .pbar.win .pn { color: var(--accent); }

      /* bignum */
      .bignum { display: flex; width: 100%; justify-content: center; align-items: flex-start; flex-wrap: nowrap; gap: 0.04em; line-height: 0.92;
        color: var(--accent); font-weight: 900; font-size: 280px; letter-spacing: -4px; white-space: nowrap; font-variant-numeric: tabular-nums; }
      .bignum .bu { font-size: 0.42em; font-weight: 800; color: var(--accent2); align-self: flex-start; margin-top: 0.12em; }
      .blabel { color: var(--sub); font-weight: 600; font-size: 40px; }

      /* glow blob nền — trôi nhẹ suốt clip. TỐI ƯU RENDER: KHÔNG dùng filter:blur (rất chậm trên
         software render no-GPU) — dùng radial-gradient mềm sẵn (gần như y hệt mắt thường, nhanh hơn nhiều). */
      .glowblob { position: absolute; width: 1000px; height: 1000px; border-radius: 50%; left: 2%; top: 10%;
        background: radial-gradient(circle, var(--glow) 0%, rgba(255,255,255,0) 72%);
        opacity: 0.8; pointer-events: none; will-change: transform; }

      /* point scene — 3 BIẾN THỂ luân phiên (phá đơn điệu) + .word cho kinetic typography */
      .ptt .word { display: inline-block; will-change: transform, opacity; }
      .ptt .ac { color: var(--accent); }
      /* V0 numlead: số lớn trái + nội dung phải */
      .pointbig { display: flex; gap: 38px; align-items: flex-start; will-change: transform, opacity; }
      .pointbig .pnum { flex: 0 0 auto; font-weight: 900; font-size: 176px; line-height: 0.8; color: var(--accent);
        letter-spacing: -6px; font-variant-numeric: tabular-nums; }
      .pointbig .pbd { flex: 1; min-width: 0; }
      .pointbig .ptt { color: var(--ink); font-weight: 800; font-size: 60px; line-height: 1.18; padding-top: 6px; }
      /* V1 iconcard: icon-square lớn (gradient) trên + nội dung dưới */
      .pointcard { display: flex; flex-direction: column; gap: 30px; will-change: transform, opacity; }
      .pointcard .picbig { width: 116px; height: 116px; border-radius: 28px; color: #fff;
        background: linear-gradient(150deg, var(--accent), var(--accent2)); box-shadow: 0 16px 36px var(--glow);
        display: flex; align-items: center; justify-content: center; }
      .pointcard .picbig svg { width: 60px; height: 60px; }
      .pointcard .ptt { color: var(--ink); font-weight: 800; font-size: 64px; line-height: 1.16; }
      /* V2 quote: thanh accent dọc + nội dung lớn + số mờ */
      .pquote { display: flex; gap: 32px; align-items: stretch; will-change: transform, opacity; }
      .pquote .qbar { flex: 0 0 14px; border-radius: 8px; background: linear-gradient(180deg, var(--accent), var(--accent2)); }
      .pquote .qbd { flex: 1; min-width: 0; }
      .pquote .qn { color: var(--accent2); font-weight: 900; font-size: 44px; font-variant-numeric: tabular-nums; }
      .pquote .ptt { color: var(--ink); font-weight: 800; font-size: 66px; line-height: 1.15; margin-top: 6px; }

      /* ── Point = 2-tile bento (tile SỐ + tile NỘI DUNG) — lấp khung, hết band trống ── */
      .ptbento { display: flex; gap: 24px; }
      .ptbento.v0 { flex-direction: column; }            /* số TRÊN · nội dung DƯỚI */
      .ptbento.v1 { flex-direction: row; }               /* số TRÁI · nội dung PHẢI */
      .pttile { position: relative; border-radius: 28px; padding: 46px 44px; display: flex; flex-direction: column;
        min-width: 0; min-height: 0; overflow: hidden; will-change: transform, opacity; }
      .ptbento.v0 .pt-num { flex: 0 0 33%; } .ptbento.v1 .pt-num { flex: 0 0 34%; }
      .pt-num { justify-content: space-between; gap: 14px; }
      .pt-num .pteb { display: inline-flex; align-items: center; gap: 12px; font-weight: 800; font-size: 27px;
        letter-spacing: 2px; text-transform: uppercase; }
      .pt-num .pteb .pdot { width: 12px; height: 12px; border-radius: 50%; background: currentColor; }
      .pt-num .pnum { font-weight: 900; font-size: 210px; line-height: 0.78; letter-spacing: -8px; font-variant-numeric: tabular-nums; }
      .pt-num .picr { width: 66px; height: 66px; border-radius: 18px; display: flex; align-items: center; justify-content: center; align-self: flex-end; }
      .pt-num .picr svg { width: 36px; height: 36px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .pt-body { flex: 1 1 auto; justify-content: flex-start; background: var(--card); border: 1px solid var(--card-border);
        box-shadow: var(--elev-1); }
      .pt-body .ptt { position: relative; z-index: 2; font-weight: 800; font-size: 60px; line-height: 1.16; color: var(--ink); }
      .pt-body .ptt .ac { color: var(--accent); }
      /* glyph icon mờ KHỔNG LỒ lấp góc dưới-phải tile nội dung → cân bố cục (chữ trên-trái · glyph dưới-phải) */
      .ptglyph { position: absolute; right: 26px; bottom: 20px; z-index: 1; color: var(--accent); opacity: 0.08; pointer-events: none; }
      .ptglyph svg { display: block; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .ptbento.v0 .ptglyph svg { width: 300px; height: 300px; }
      .ptbento.v1 .ptglyph svg { width: 200px; height: 200px; }
      /* treatment GRAD — tile số gradient (chữ trắng) */
      .pt-num.grad { background: linear-gradient(150deg, var(--accent), var(--accent2)); box-shadow: var(--elev-2); color: #fff; }
      .pt-num.grad .pnum { color: #fff; } .pt-num.grad .pteb { color: rgba(255,255,255,0.85); }
      .pt-num.grad .picr { background: rgba(255,255,255,0.18); color: #fff; }

      /* ── POINT v2: thẻ HƯỚNG DẪN giàu data (tiêu đề + cách làm + số liệu) — 2 thẻ xếp lớp, chiều sâu ── */
      .ptwrap { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: center; gap: 46px; margin-top: 40px; position: relative; z-index: 1; }
      /* thẻ DẠY (tiêu đề + cách làm) — elevation-1 + gáy gradient bên trái = chiều sâu lớp 1 */
      .pttop { position: relative; display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--card-border);
        border-radius: 34px; padding: 60px 54px 64px 66px; box-shadow: var(--elev-1); overflow: hidden; }
      .pttop::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 10px;
        background: linear-gradient(180deg, var(--accent), var(--accent2)); }
      .pttitle { color: var(--ink); font-weight: 900; font-size: 80px; line-height: 1.08; letter-spacing: -1px; }
      .pttitle .ac { color: var(--accent); }

      .ptdetail { color: var(--sub); font-weight: 600; font-size: 43px; line-height: 1.38; margin-top: 26px; max-width: 97%; }
      /* thẻ SỐ LIỆU — gradient elevation-2 = chiều sâu lớp 2 */
      .ptstat { border-radius: 30px; padding: 60px 50px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
      .ptstat .psval { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
      .ptstat .psv { color: #fff; font-weight: 900; font-size: 130px; line-height: 0.86; letter-spacing: -3px; font-variant-numeric: tabular-nums; white-space: nowrap; }
      .ptstat .psu { color: rgba(255,255,255,0.92); font-weight: 800; font-size: 50px; }
      .ptstat .pslbl { color: rgba(255,255,255,0.95); font-weight: 800; font-size: 34px; letter-spacing: 0.5px; text-align: right; line-height: 1.2; max-width: 46%; text-transform: uppercase; }
      /* watermark số KHỔNG LỒ — NỀN phía sau cụm 2 thẻ (top cố định ~giữa khung; KHÔNG dùng transform vì
         GSAP animate x/scale lên phần tử này) → chiều sâu, cân bố cục, ló mép phải */
      .ptwm { position: absolute; right: -64px; top: 690px; z-index: 0; font-weight: 900; font-size: 720px;
        line-height: 0.72; color: var(--accent); opacity: 0.07; pointer-events: none; font-variant-numeric: tabular-nums; }
      /* treatment TINT — tile số nền tím nhạt (chữ accent) */
      .pt-num.tint { background: linear-gradient(150deg, var(--acc-a12), var(--acc-a03)); border: 1px solid var(--acc-a14); color: var(--accent); }
      .pt-num.tint .pnum { color: var(--accent); } .pt-num.tint .pteb { color: var(--accent); }
      .pt-num.tint .picr { background: var(--accent); color: #fff; }

      /* ── Bento-host: bọc cảnh 1-phần-tử (bignum/donut/trend) cho lấp khung (breathing room TRONG tile = premium) ── */
      .bentohost { position: relative; display: flex; flex-direction: column; border-radius: 30px; padding: 54px 50px;
        overflow: hidden; will-change: transform, opacity; }
      .bentohost .hosthead { flex: 0 0 auto; }
      .bentohost .hostbody { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 30px; min-height: 0; }
      .bentohost.plain { background: var(--card); box-shadow: var(--elev-1); border: 1px solid var(--card-border); }
      .bentohost.tint { background: linear-gradient(155deg, var(--acc-a08), var(--acc-a03)); border: 1px solid var(--acc-a12); box-shadow: var(--elev-1); }
      .bentohost::before { content: ""; position: absolute; left: 0; right: 0; top: 0; height: 6px;
        background: linear-gradient(90deg, var(--accent), var(--accent2)); }

      /* thanh tiến trình đáy (lấp đáy + nhịp pro) */

        background: var(--acc-a12); overflow: hidden; z-index: 40; }
      #progress .pfb { position: absolute; inset: 0; transform-origin: left center; transform: scaleX(0);
        border-radius: 999px; background: linear-gradient(90deg, var(--accent2), var(--accent)); will-change: transform; }

      /* ── Caption SYNC (karaoke) — học ref @escbase. Ẩn nếu không có biến captions. ── */
      #capbox { position: absolute; left: 64px; right: 64px; bottom: 138px; z-index: 35;
        display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-end; gap: 4px 0.34em;
        text-align: center; font-weight: 800; font-size: 47px; line-height: 1.22; letter-spacing: -0.2px;
        opacity: 0; text-shadow: 0 2px 16px rgba(0,0,0,0.45); }
      #capbox .cw { color: var(--sub); transition: color 0.12s linear; }   /* chưa đọc tới → mờ */
      #capbox .cw.said { color: var(--ink); }                              /* đã đọc → rõ */
      #capbox .cw.cur { color: var(--accent); }                            /* đang đọc → highlight */
      /* Có caption → chừa chỗ đáy để KHÔNG đè nội dung cảnh */
      [data-caps="1"] .scene.left { padding-bottom: 296px; }
      /* Point scene: cụm 2 thẻ căn giữa KHÔNG chạm đáy → bỏ reserve caption to → căn giữa theo TOÀN khung (cân hơn) */
      [data-caps="1"] .scene.left.ptscene { padding-bottom: 172px; }
      [data-caps="1"] .scene.center { padding-bottom: 220px; }

      /* header trên (brand/topic) — đóng khung phần đỉnh ở mọi cảnh, hết trống đầu */
      #topbar { position: absolute; left: 72px; top: 76px; display: inline-flex; align-items: center; gap: 16px; z-index: 40; }
      #topbar .tmark { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
      #topbar .tmark svg { width: 22px; height: 22px; }
      #topbar .ttxt { color: var(--sub); font-weight: 800; font-size: 28px; letter-spacing: 2.5px; text-transform: uppercase; }
      #topbar .tline { width: 60px; height: 4px; border-radius: 999px; background: var(--acc-a25); }

      /* ── S_donut: vòng tròn % (to hơn cho đầy khung) ── */
      .donutwrap { position: relative; width: 660px; height: 660px; align-self: center; }
      .donut { width: 100%; height: 100%; transform: rotate(-90deg); }
      .donut .dtrack { fill: none; stroke: var(--acc-a12); stroke-width: 24; }
      .donut .dfill { fill: none; stroke: url(#dnGrad); stroke-width: 24; stroke-linecap: round;
        stroke-dasharray: 578; stroke-dashoffset: 578; will-change: stroke-dashoffset; }
      .dcenter { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
      .dcenter .dval { display: inline-flex; align-items: baseline; color: var(--accent); font-weight: 900;
        font-size: 188px; font-variant-numeric: tabular-nums; line-height: 1; }
      .dcenter .du { font-size: 0.5em; color: var(--accent2); margin-left: 4px; }

      /* ── S_ba: before → after (3 hàng phân bố: nhãn trên · số giữa · thanh tỉ lệ dưới) ── */
      .bawrap { display: flex; align-items: stretch; gap: 26px; width: 100%; }
      .baside { flex: 1; padding: 50px 30px; border-radius: 26px; text-align: center; display: flex; flex-direction: column;
        justify-content: space-between; gap: 18px; will-change: transform, opacity; }
      .baside.l { background: var(--card); box-shadow: var(--elev-1); }
      .baside.r { background: linear-gradient(150deg, var(--accent), var(--accent2)); box-shadow: var(--elev-2); }
      .baside .bahd { font-weight: 800; font-size: 32px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--sub); }
      .baside.r .bahd { color: rgba(255,255,255,0.9); }
      .baside .bav { font-weight: 900; font-size: 132px; line-height: 0.92; color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; }
      .baside.r .bav { color: #fff; }
      .baside .bav .bu { font-size: 0.40em; margin-left: 0.1em; color: var(--accent); }
      .baside.r .bav .bu { color: rgba(255,255,255,0.9); }
      .baside .babar { width: 100%; height: 16px; border-radius: 999px; overflow: hidden; background: var(--acc-a14); }
      .baside.r .babar { background: rgba(255,255,255,0.28); }
      .baside .babar i { display: block; height: 100%; border-radius: 999px; transform-origin: left center; transform: scaleX(0);
        will-change: transform; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
      .baside.r .babar i { background: #fff; }
      .baarrow { flex: 0 0 66px; width: 66px; height: 66px; color: var(--accent); align-self: center; }

      /* ── S_mini: lưới 2×2 mini-stat (hàng dãn ĐỀU 1fr → thẻ cao đều, hết hở giữa) ── */
      .minigrid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 24px; width: 100%; }
      .ministat { padding: 44px 36px; border-radius: 22px; background: var(--card); box-shadow: var(--elev-1);
        border: 1px solid var(--card-border); display: flex; flex-direction: column; justify-content: center; will-change: transform, opacity; }
      .ministat .mi { width: 60px; height: 60px; border-radius: 15px; background: var(--acc-a12); color: var(--accent);
        display: flex; align-items: center; justify-content: center; margin-bottom: 26px; }

      .ministat .mv { color: var(--accent); font-weight: 900; font-size: 78px; line-height: 1; font-variant-numeric: tabular-nums; }
      .ministat .mv .mu { font-size: 0.46em; color: var(--accent2); }
      .ministat .ml { color: var(--sub); font-weight: 600; font-size: 30px; margin-top: 14px; line-height: 1.25; }

      /* ── S_trend: đường tăng (CHART lấp hết thân thẻ + badge đỉnh) ── */
      .trendwrap { position: relative; width: 100%; flex: 1 1 auto; height: auto; min-height: 460px; align-self: stretch; }
      .trendsvg { width: 100%; height: 100%; overflow: visible; }

      .trendsvg .tarea { fill: var(--acc-a10); stroke: none; }
      .tdot { position: absolute; width: 30px; height: 30px; border-radius: 50%; background: var(--accent);
        box-shadow: 0 0 0 9px var(--acc-a18); transform: translate(-50%,-50%); will-change: transform, opacity; }
      .tbadge { position: absolute; transform: translate(-50%,-150%); padding: 9px 20px; border-radius: 999px;
        background: var(--accent); color: #fff; font-weight: 800; font-size: 36px; white-space: nowrap;
        font-variant-numeric: tabular-nums; box-shadow: 0 10px 26px var(--glow); will-change: transform, opacity; }

      /* ── S1 hero (center) ── */
      #s1 .key { display: block; color: var(--accent); font-weight: 900; font-size: 150px; line-height: 0.98; letter-spacing: -1px; }
      #s1 .l { display: block; color: var(--ink); font-weight: 900; font-size: 78px; line-height: 1.05; }
      #s1 .sub { display: block; color: var(--sub); font-weight: 600; font-size: 44px; margin-top: 18px; }
      #s1 .herocard { width: 560px; height: 540px; margin-top: 44px; padding: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; will-change: transform, opacity; }
      #s1 .herocard img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 24px 40px rgba(90,70,170,0.25)); } /* giữ shadow cho 3D nổi (chỉ 1 cảnh hero ~5s, không đáng kể tốc độ) */

      /* ── S7 CTA (center) ── */
      #s7 .e1 { color: var(--ink); font-weight: 800; font-size: 80px; line-height: 1.14; }
      #s7 .e2 { color: var(--accent); font-weight: 900; font-size: 150px; line-height: 1.12; letter-spacing: -1px; margin-top: 18px; will-change: transform; }
      #s7 .e2 .e2hl { color: var(--accent2); }
      #s7 .e3 { color: var(--sub); font-weight: 700; font-size: 44px; margin-top: 44px; display: flex; align-items: center; justify-content: center; gap: 14px; }
      #s7 .e3 svg { width: 54px; height: 54px; }

      /* ── SKIN theo BrandKit.styleVariant (html[data-skin]) — Phase 2.
         classic = default, KHÔNG rule nào ở đây đụng vào. Tham khảo bố cục gallery
         html-video (Apache-2.0): poster ~ frame-bold-poster (đậm, uppercase, góc sắc);
         editorial ~ gu data-chart-nyt/tạp chí (serif display, kicker gạch chân). ── */
      html[data-skin="poster"] #s1 .key { font-size: 156px; letter-spacing: -3px; text-transform: uppercase; }
      html[data-skin="poster"] #s1 .l { text-transform: uppercase; letter-spacing: -1.5px; }

      html[data-skin="poster"] .callout { border-radius: 8px; border-left-width: 12px; }

      /* Editorial: GIỮ Be Vietnam Pro (serif hệ thống vỡ dấu tiếng Việt — đã test) —
         tạo chất tạp chí bằng weight nhẹ hơn + kicker gạch chân + radius lớn. */
      html[data-skin="editorial"] #s1 .key { font-weight: 800; letter-spacing: -0.5px; }
      html[data-skin="editorial"] #s1 .l { font-weight: 700; }
      html[data-skin="editorial"] #s7 .e2 { font-weight: 800; letter-spacing: -0.5px; }
      html[data-skin="editorial"] .pttitle { font-weight: 800; }
      html[data-skin="editorial"] .bento, html[data-skin="editorial"] .bentohost, html[data-skin="editorial"] .pttop,
      html[data-skin="editorial"] .ptstat, html[data-skin="editorial"] .pttile, html[data-skin="editorial"] .pbar,

      html[data-skin="editorial"] .eyebrow.dot { background: transparent; border-bottom: 3px solid var(--accent); border-radius: 0; padding: 8px 4px; }
      html[data-skin="editorial"] .eyebrow.dot::before { display: none; }

      <!-- S_ba: before → after -->
